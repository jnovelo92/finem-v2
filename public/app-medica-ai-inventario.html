<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Inventario · App Médica·AI</title>
<style>
/* ============================================================
   App Médica·AI — Colors & Type Tokens
   ============================================================
   Source of truth for color + type CSS variables.
   Pair with @font-face declarations in fonts.css.
   ============================================================ */

:root {
  /* ─── Surfaces (modo oscuro nativo) ─────────────────────────── */
  --bg-base:     #07090C;   /* sidebar, capa más profunda */
  --bg-page:     #0A0E14;   /* background general */
  --bg-card:     #11161E;   /* tarjetas, contenido */
  --bg-card-2:   #161C26;   /* hover, secundario */
  --bg-elev:     #1B2330;   /* menus, dropdowns elevados */
  --bg-input:    #0E131B;   /* inputs */

  /* ─── Borders ───────────────────────────────────────────────── */
  --border-subtle:  #1E2530;
  --border-default: #262F3D;
  --border-strong:  #36404F;

  /* ─── Text ──────────────────────────────────────────────────── */
  --text-primary:   #E8ECEF;
  --text-secondary: #9AA5B1;
  --text-tertiary:  #6B7684;
  --text-disabled:  #4A5260;

  /* ─── Brand · Azul clínico (escala) ─────────────────────────── */
  --brand-50:  #E8F2FE;
  --brand-100: #BFDBFB;
  --brand-200: #8FBEF7;
  --brand-300: #5FA1F2;
  --brand-400: #3D8DEC;
  --brand-500: #2D7FE3;
  --brand-600: #1E88E5;   /* primario de marca */
  --brand-700: #1768B5;

  /* ─── Semánticos clínicos ───────────────────────────────────── */
  --clinical-positive:    #00C896;
  --clinical-positive-bg: #003D2E;
  --clinical-warning:     #F8B547;
  --clinical-warning-bg:  #3D2A0A;
  --clinical-critical:    #E04B3C;
  --clinical-critical-bg: #3D1410;
  --clinical-info:        var(--brand-500);
  --clinical-info-bg:     #0F2540;

  /* ─── Acento IA (única señal cromática para contenido generado) */
  --ai-accent:        #66D9D2;
  --ai-accent-soft:   rgba(102, 217, 210, 0.12);
  --ai-accent-line:   rgba(102, 217, 210, 0.32);

  /* ─── Tipografía ────────────────────────────────────────────── */
  --font-sans: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* Tamaños (4-pt scale, disciplinada: 12/14/16/20/24/32/48) */
  --fs-display: 48px;   /* hero/marketing */
  --fs-title:   32px;   /* page title */
  --fs-h2:      24px;
  --fs-h3:      20px;
  --fs-body-lg: 16px;
  --fs-body:    14px;   /* default UI body */
  --fs-caption: 12px;

  /* Pesos */
  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semi:    600;
  --fw-bold:    700;   /* reservado para alertas críticas */

  /* ─── Radii ─────────────────────────────────────────────────── */
  --r-sm:  4px;   /* inputs */
  --r-md:  6px;   /* botones */
  --r-lg:  8px;   /* cards */
  --r-xl:  12px;  /* modales */
  --r-2xl: 16px;  /* heros / brand cards */

  /* ─── Spacing scale (base 4) ────────────────────────────────── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-6: 24px;
  --space-8: 32px;
  --space-12: 48px;
  --space-16: 64px;

  /* ─── Shadows — mínimas; preferimos border + bg ─────────────── */
  --shadow-sm:    0 1px 0 rgba(0,0,0,0.3);
  --shadow-md:    0 2px 8px rgba(0,0,0,0.35);
  --shadow-lg:    0 8px 24px rgba(0,0,0,0.45);
  --shadow-focus: 0 0 0 3px rgba(30, 136, 229, 0.25);
}

/* ============================================================
   Semantic element styles — opcional, pero asegura consistencia
   ============================================================ */

html, body {
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: var(--fs-body);
  line-height: 1.5;
}

h1, .h1 {
  font-size: var(--fs-title);
  font-weight: var(--fw-semi);
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--text-primary);
}

h2, .h2 {
  font-size: var(--fs-h2);
  font-weight: var(--fw-semi);
  letter-spacing: -0.015em;
  line-height: 1.2;
  color: var(--text-primary);
}

h3, .h3-text {
  font-size: var(--fs-h3);
  font-weight: var(--fw-medium);
  letter-spacing: -0.01em;
  line-height: 1.3;
  color: var(--text-primary);
}

p {
  font-size: var(--fs-body);
  color: var(--text-secondary);
  line-height: 1.55;
  text-wrap: pretty;
}

code, .mono, .clinical-data {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  color: var(--text-secondary);
  font-feature-settings: "tnum";
}

::selection { background: rgba(30, 136, 229, 0.35); color: #fff; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border-default);
  border-radius: 6px;
  border: 2px solid var(--bg-page);
}
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* Standalone fallback fonts (Geist/Geist Mono not bundled — system stack) */
:root {
  --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}
body { overflow-x: hidden; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 6px; border: 2px solid var(--bg-page); }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

input, button, textarea, select { font-family: inherit; color: inherit; }
button { cursor: pointer; }

::selection { background: rgba(110,168,254,.3); color: var(--text-primary); }
:focus-visible { outline: 2px solid var(--brand-500); outline-offset: 2px; border-radius: 4px; }

@keyframes aiPulse {
  0%   { transform: scale(1);   opacity: 0.6; }
  100% { transform: scale(2.6); opacity: 0;   }
}

.row { display: flex; align-items: center; }
</style>
</head>

<script type="text/babel">
;(function(){
// ds-icons.jsx — minimal stroke icons used across the design system

const Icon = ({ name, size = 16, ...rest }) => {
  const props = {
    width: size,
    height: size,
    viewBox: "0 0 24 24",
    fill: "none",
    stroke: "currentColor",
    strokeWidth: 1.6,
    strokeLinecap: "round",
    strokeLinejoin: "round",
    ...rest
  };
  switch (name) {
    case "home": return <svg {...props}><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>;
    case "calendar": return <svg {...props}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>;
    case "users": return <svg {...props}><circle cx="9" cy="9" r="3.5"/><path d="M2.5 19c.7-3 3.5-5 6.5-5s5.8 2 6.5 5"/><circle cx="17" cy="8" r="2.5"/><path d="M21.5 17c-.4-2-2-3.5-4-3.5"/></svg>;
    case "file": return <svg {...props}><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/></svg>;
    case "stethoscope": return <svg {...props}><path d="M5 3v6a4 4 0 0 0 8 0V3M5 3h2M11 3h2"/><path d="M9 13v3a4 4 0 0 0 8 0v-1"/><circle cx="17" cy="13" r="2"/></svg>;
    case "pill": return <svg {...props}><rect x="3" y="9" width="18" height="6" rx="3" transform="rotate(-30 12 12)"/><path d="m8.5 7.5 7 7" transform="rotate(-30 12 12)"/></svg>;
    case "flask": return <svg {...props}><path d="M9 3h6M10 3v6L5 19a2 2 0 0 0 1.7 3h10.6A2 2 0 0 0 19 19l-5-10V3"/><path d="M7 14h10"/></svg>;
    case "activity": return <svg {...props}><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>;
    case "search": return <svg {...props}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>;
    case "bell": return <svg {...props}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 7 3 9H3c0-2 3-2 3-9z"/><path d="M10.5 21a2 2 0 0 0 3 0"/></svg>;
    case "sparkle": return <svg {...props}><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/></svg>;
    case "check": return <svg {...props}><path d="m5 12 5 5L20 7"/></svg>;
    case "x": return <svg {...props}><path d="M6 6l12 12M6 18 18 6"/></svg>;
    case "alert": return <svg {...props}><path d="M12 8v5M12 17h.01"/><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.41 0z"/></svg>;
    case "info": return <svg {...props}><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/></svg>;
    case "chevron-right": return <svg {...props}><path d="m9 6 6 6-6 6"/></svg>;
    case "chevron-down": return <svg {...props}><path d="m6 9 6 6 6-6"/></svg>;
    case "plus": return <svg {...props}><path d="M12 5v14M5 12h14"/></svg>;
    case "mic": return <svg {...props}><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>;
    case "trend-up": return <svg {...props}><path d="m3 17 6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>;
    case "trend-down": return <svg {...props}><path d="m3 7 6 6 4-4 8 8"/><path d="M14 17h7v-7"/></svg>;
    case "box": return <svg {...props}><path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg>;
    case "command": return <svg {...props}><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>;
    case "shield": return <svg {...props}><path d="M12 3 4 6v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V6z"/><path d="m9 12 2 2 4-4"/></svg>;
    case "settings": return <svg {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>;
    case "logout": return <svg {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>;
    case "arrow-up": return <svg {...props}><path d="M12 19V5M5 12l7-7 7 7"/></svg>;
    case "arrow-down": return <svg {...props}><path d="M12 5v14M5 12l7 7 7-7"/></svg>;
    case "play": return <svg {...props}><path d="M6 4 20 12 6 20z"/></svg>;
    case "edit": return <svg {...props}><path d="M11 4H4v16h16v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>;
    case "lab": return <svg {...props}><path d="M9 3v6l-5 9a2 2 0 0 0 1.7 3h12.6A2 2 0 0 0 20 18l-5-9V3M9 3h6"/></svg>;
    case "warehouse": return <svg {...props}><path d="M3 21V8l9-4 9 4v13"/><path d="M7 21v-7h10v7M7 17h10"/></svg>;
    case "barcode": return <svg {...props}><path d="M4 6v12M7 6v12M10 6v12M13 6v12M16 6v12M19 6v12" strokeWidth="1.2"/></svg>;
    default: return <svg {...props}><circle cx="12" cy="12" r="3"/></svg>;
  }
};

// Sparkline component
const Sparkline = ({ data, color = "currentColor", width = 80, height = 24 }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const step = width / (data.length - 1);
  const points = data.map((v, i) => `${i * step},${height - ((v - min) / range) * (height - 4) - 2}`).join(" ");
  const areaPoints = `0,${height} ${points} ${width},${height}`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: "block" }}>
      <polygon points={areaPoints} fill={color} opacity="0.12" />
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

Object.assign(window, { Icon, Sparkline });

})();
</script>
<script type="text/babel">
;(function(){
// Components.jsx — App Médica·AI UI Kit primitives
// Inputs, buttons, badges, cards, alerts, tables, sidebar, KPIs, etc.
// Companions: Icons.jsx (must load first), AISurfaces.jsx (specialized)

const { useState } = React;

/* ─────────────────────────── BUTTONS ───────────────────────── */

const Button = ({ variant = "primary", size = "md", icon, iconRight, children, onClick, disabled, type = "button" }) => {
  const sizes = {
    sm: { height: 28, padding: "0 10px", fontSize: 13, gap: 6 },
    md: { height: 34, padding: "0 14px", fontSize: 13, gap: 8 },
    lg: { height: 40, padding: "0 18px", fontSize: 14, gap: 8 },
  };
  const variants = {
    primary: {
      background: "var(--brand-600)",
      color: "#fff",
      border: "1px solid transparent",
    },
    secondary: {
      background: "var(--bg-card-2)",
      color: "var(--text-primary)",
      border: "1px solid var(--border-default)",
    },
    ghost: {
      background: "transparent",
      color: "var(--text-secondary)",
      border: "1px solid transparent",
    },
    danger: {
      background: "var(--clinical-critical)",
      color: "#fff",
      border: "1px solid transparent",
    },
    ai: {
      background: "transparent",
      color: "var(--ai-accent)",
      border: "1px solid var(--ai-accent-line)",
    },
  };
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      style={{
        ...sizes[size],
        ...variants[variant],
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        borderRadius: "var(--r-md)",
        fontFamily: "var(--font-sans)",
        fontWeight: 500,
        letterSpacing: "-0.005em",
        cursor: disabled ? "not-allowed" : "default",
        opacity: disabled ? 0.5 : 1,
        transition: "background 120ms ease, border-color 120ms ease, color 120ms ease",
        whiteSpace: "nowrap",
      }}
      onMouseEnter={(e) => {
        if (disabled) return;
        if (variant === "primary") e.currentTarget.style.background = "var(--brand-500)";
        if (variant === "secondary") e.currentTarget.style.borderColor = "var(--border-strong)";
        if (variant === "ghost") e.currentTarget.style.background = "var(--bg-card-2)";
        if (variant === "ai") e.currentTarget.style.background = "var(--ai-accent-soft)";
      }}
      onMouseLeave={(e) => {
        if (variant === "primary") e.currentTarget.style.background = "var(--brand-600)";
        if (variant === "secondary") e.currentTarget.style.borderColor = "var(--border-default)";
        if (variant === "ghost") e.currentTarget.style.background = "transparent";
        if (variant === "ai") e.currentTarget.style.background = "transparent";
      }}
    >
      {icon && <Icon name={icon} size={size === "lg" ? 16 : 14} />}
      {children}
      {iconRight && <Icon name={iconRight} size={size === "lg" ? 16 : 14} />}
    </button>
  );
};

const IconButton = ({ icon, onClick, label }) => (
  <button
    aria-label={label}
    onClick={onClick}
    style={{
      width: 32,
      height: 32,
      display: "inline-flex",
      alignItems: "center",
      justifyContent: "center",
      background: "transparent",
      color: "var(--text-secondary)",
      border: "1px solid var(--border-subtle)",
      borderRadius: "var(--r-md)",
      transition: "all 120ms ease",
    }}
    onMouseEnter={(e) => {
      e.currentTarget.style.color = "var(--text-primary)";
      e.currentTarget.style.background = "var(--bg-card-2)";
      e.currentTarget.style.borderColor = "var(--border-default)";
    }}
    onMouseLeave={(e) => {
      e.currentTarget.style.color = "var(--text-secondary)";
      e.currentTarget.style.background = "transparent";
      e.currentTarget.style.borderColor = "var(--border-subtle)";
    }}
  >
    <Icon name={icon} size={14} />
  </button>
);

const KbdHint = ({ children }) => (
  <span
    style={{
      display: "inline-flex",
      alignItems: "center",
      justifyContent: "center",
      minWidth: 18,
      height: 18,
      padding: "0 5px",
      background: "var(--bg-base)",
      border: "1px solid var(--border-default)",
      borderRadius: 4,
      fontFamily: "var(--font-mono)",
      fontSize: 10,
      color: "var(--text-tertiary)",
      letterSpacing: 0,
    }}
  >
    {children}
  </span>
);

/* ─────────────────────────── INPUTS ────────────────────────── */

const Input = ({ placeholder, value, onChange, icon, type = "text", style, ...rest }) => {
  const [focus, setFocus] = useState(false);
  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 8,
        height: 34,
        padding: "0 10px",
        background: "var(--bg-input)",
        border: `1px solid ${focus ? "var(--brand-500)" : "var(--border-default)"}`,
        borderRadius: "var(--r-sm)",
        boxShadow: focus ? "var(--shadow-focus)" : "none",
        transition: "border-color 120ms ease, box-shadow 120ms ease",
        ...style,
      }}
    >
      {icon && <Icon name={icon} size={14} style={{ color: "var(--text-tertiary)", flexShrink: 0 }} />}
      <input
        type={type}
        value={value}
        onChange={onChange}
        onFocus={() => setFocus(true)}
        onBlur={() => setFocus(false)}
        placeholder={placeholder}
        style={{
          flex: 1,
          background: "transparent",
          border: "none",
          outline: "none",
          color: "var(--text-primary)",
          fontFamily: "var(--font-sans)",
          fontSize: 13,
          minWidth: 0,
        }}
        {...rest}
      />
    </div>
  );
};

const Field = ({ label, hint, children }) => (
  <label style={{ display: "block" }}>
    <div style={{ fontSize: 12, fontWeight: 500, color: "var(--text-secondary)", marginBottom: 6 }}>
      {label}
    </div>
    {children}
    {hint && <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 4 }}>{hint}</div>}
  </label>
);

const Toggle = ({ checked, onChange, label }) => (
  <label style={{ display: "inline-flex", alignItems: "center", gap: 10, cursor: "default" }}>
    <span
      onClick={() => onChange?.(!checked)}
      style={{
        position: "relative",
        width: 32,
        height: 18,
        background: checked ? "var(--brand-600)" : "var(--bg-input)",
        border: `1px solid ${checked ? "var(--brand-600)" : "var(--border-default)"}`,
        borderRadius: 999,
        transition: "all 120ms ease",
      }}
    >
      <span
        style={{
          position: "absolute",
          top: 1,
          left: checked ? 15 : 1,
          width: 14,
          height: 14,
          background: "#fff",
          borderRadius: "50%",
          transition: "left 120ms ease",
        }}
      />
    </span>
    {label && <span style={{ fontSize: 13, color: "var(--text-primary)" }}>{label}</span>}
  </label>
);

/* ─────────────────────────── BADGES ────────────────────────── */

const Badge = ({ variant = "neutral", icon, children }) => {
  const variants = {
    neutral:  { bg: "var(--bg-card-2)",     fg: "var(--text-secondary)",   border: "var(--border-default)" },
    brand:    { bg: "rgba(30,136,229,.15)", fg: "var(--brand-300)",        border: "rgba(30,136,229,.3)" },
    positive: { bg: "var(--clinical-positive-bg)", fg: "var(--clinical-positive)", border: "rgba(0,200,150,.3)" },
    warning:  { bg: "var(--clinical-warning-bg)",  fg: "var(--clinical-warning)",  border: "rgba(248,181,71,.3)" },
    critical: { bg: "var(--clinical-critical-bg)", fg: "var(--clinical-critical)", border: "rgba(224,75,60,.4)" },
    ai:       { bg: "var(--ai-accent-soft)",       fg: "var(--ai-accent)",         border: "var(--ai-accent-line)" },
  };
  const v = variants[variant];
  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 5,
        height: 20,
        padding: "0 8px",
        background: v.bg,
        color: v.fg,
        border: `1px solid ${v.border}`,
        borderRadius: 4,
        fontFamily: "var(--font-sans)",
        fontSize: 11,
        fontWeight: 500,
        letterSpacing: "-0.005em",
        whiteSpace: "nowrap",
      }}
    >
      {icon && <Icon name={icon} size={11} />}
      {children}
    </span>
  );
};

const StatusDot = ({ variant = "neutral", pulse = false }) => {
  const colors = {
    neutral:  "var(--text-tertiary)",
    positive: "var(--clinical-positive)",
    warning:  "var(--clinical-warning)",
    critical: "var(--clinical-critical)",
    ai:       "var(--ai-accent)",
    brand:    "var(--brand-500)",
  };
  return (
    <span
      style={{
        position: "relative",
        display: "inline-block",
        width: 8,
        height: 8,
        background: colors[variant],
        borderRadius: "50%",
        flexShrink: 0,
      }}
    >
      {pulse && (
        <span
          style={{
            position: "absolute",
            inset: -2,
            border: `1px solid ${colors[variant]}`,
            borderRadius: "50%",
            animation: "aiPulse 2s ease-out infinite",
          }}
        />
      )}
    </span>
  );
};

/* ─────────────────────────── CARDS ─────────────────────────── */

const Card = ({ children, padding = 20, accent, style }) => (
  <div
    style={{
      background: "var(--bg-card)",
      border: "1px solid var(--border-subtle)",
      borderRadius: "var(--r-lg)",
      padding,
      position: "relative",
      ...(accent === "ai"
        ? {
            borderColor: "var(--ai-accent-line)",
            background:
              "linear-gradient(var(--bg-card), var(--bg-card)) padding-box, linear-gradient(180deg, var(--ai-accent-line), transparent 40%) border-box",
          }
        : {}),
      ...style,
    }}
  >
    {children}
  </div>
);

const SectionHeader = ({ eyebrow, title, action }) => (
  <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 16, gap: 16 }}>
    <div>
      {eyebrow && (
        <div
          style={{
            fontFamily: "var(--font-mono)",
            fontSize: 10,
            fontWeight: 500,
            color: "var(--text-tertiary)",
            textTransform: "uppercase",
            letterSpacing: "0.08em",
            marginBottom: 6,
          }}
        >
          {eyebrow}
        </div>
      )}
      <h2 style={{ margin: 0, fontSize: 18, fontWeight: 600, letterSpacing: "-0.015em", color: "var(--text-primary)" }}>
        {title}
      </h2>
    </div>
    {action}
  </div>
);

/* ─────────────────────────── ALERTS ────────────────────────── */

const Alert = ({ variant = "info", title, children, action }) => {
  const variants = {
    info:     { bg: "var(--clinical-info-bg)",     fg: "var(--brand-300)",         border: "rgba(30,136,229,.3)",    icon: "info" },
    positive: { bg: "var(--clinical-positive-bg)", fg: "var(--clinical-positive)", border: "rgba(0,200,150,.3)",     icon: "check" },
    warning:  { bg: "var(--clinical-warning-bg)",  fg: "var(--clinical-warning)",  border: "rgba(248,181,71,.3)",    icon: "alert" },
    critical: { bg: "var(--clinical-critical-bg)", fg: "var(--clinical-critical)", border: "rgba(224,75,60,.4)",     icon: "alert" },
  };
  const v = variants[variant];
  return (
    <div
      style={{
        background: v.bg,
        border: `1px solid ${v.border}`,
        borderLeft: `3px solid ${v.fg}`,
        borderRadius: "var(--r-md)",
        padding: "12px 14px",
        display: "flex",
        gap: 12,
        alignItems: "flex-start",
      }}
    >
      <div style={{ color: v.fg, marginTop: 1, flexShrink: 0 }}>
        <Icon name={v.icon} size={16} />
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        {title && (
          <div style={{ fontSize: 13, fontWeight: 600, color: v.fg, marginBottom: children ? 4 : 0, letterSpacing: "-0.005em" }}>
            {title}
          </div>
        )}
        {children && (
          <div style={{ fontSize: 12.5, color: "var(--text-secondary)", lineHeight: 1.5 }}>{children}</div>
        )}
      </div>
      {action}
    </div>
  );
};

/* ─────────────────────────── KPI ───────────────────────────── */

const KPI = ({ label, value, unit, delta, trend, mono = true }) => {
  const trendColor =
    trend === "positive" ? "var(--clinical-positive)" :
    trend === "negative" ? "var(--clinical-critical)" :
    trend === "ai"       ? "var(--ai-accent)" :
    "var(--text-tertiary)";
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <div
        style={{
          fontFamily: "var(--font-mono)",
          fontSize: 10,
          color: "var(--text-tertiary)",
          textTransform: "uppercase",
          letterSpacing: "0.06em",
        }}
      >
        {label}
      </div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
        <span
          style={{
            fontFamily: mono ? "var(--font-mono)" : "var(--font-sans)",
            fontSize: 28,
            fontWeight: 500,
            color: "var(--text-primary)",
            letterSpacing: "-0.02em",
            fontFeatureSettings: '"tnum"',
          }}
        >
          {value}
        </span>
        {unit && <span style={{ fontSize: 12, color: "var(--text-tertiary)" }}>{unit}</span>}
      </div>
      {delta && (
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: trendColor }}>
          {trend === "positive" && "↑"}
          {trend === "negative" && "↓"}
          {trend === "ai" && <Icon name="sparkle" size={11} />}
          <span style={{ fontFamily: "var(--font-mono)" }}>{delta}</span>
        </div>
      )}
    </div>
  );
};

/* ─────────────────────────── TABLE ─────────────────────────── */

const Table = ({ columns, rows }) => (
  <div
    style={{
      background: "var(--bg-card)",
      border: "1px solid var(--border-subtle)",
      borderRadius: "var(--r-lg)",
      overflow: "hidden",
    }}
  >
    <div
      style={{
        display: "grid",
        gridTemplateColumns: columns.map((c) => c.width || "1fr").join(" "),
        padding: "10px 16px",
        background: "var(--bg-base)",
        borderBottom: "1px solid var(--border-subtle)",
      }}
    >
      {columns.map((c, i) => (
        <div
          key={i}
          style={{
            fontFamily: "var(--font-mono)",
            fontSize: 10,
            fontWeight: 500,
            color: "var(--text-tertiary)",
            textTransform: "uppercase",
            letterSpacing: "0.08em",
            textAlign: c.align || "left",
          }}
        >
          {c.label}
        </div>
      ))}
    </div>
    {rows.map((row, ri) => (
      <div
        key={ri}
        style={{
          display: "grid",
          gridTemplateColumns: columns.map((c) => c.width || "1fr").join(" "),
          padding: "12px 16px",
          borderBottom: ri < rows.length - 1 ? "1px solid var(--border-subtle)" : "none",
          fontSize: 13,
          color: "var(--text-primary)",
          alignItems: "center",
          transition: "background 100ms ease",
        }}
        onMouseEnter={(e) => (e.currentTarget.style.background = "var(--bg-card-2)")}
        onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}
      >
        {row.map((cell, ci) => (
          <div key={ci} style={{ textAlign: columns[ci].align || "left", minWidth: 0 }}>
            {cell}
          </div>
        ))}
      </div>
    ))}
  </div>
);

/* ─────────────────────────── SIDEBAR ───────────────────────── */

const SidebarItem = ({ icon, label, active, count, onClick }) => (
  <button
    onClick={onClick}
    style={{
      display: "flex",
      alignItems: "center",
      gap: 10,
      width: "100%",
      height: 32,
      padding: "0 10px",
      background: active ? "var(--bg-card-2)" : "transparent",
      color: active ? "var(--text-primary)" : "var(--text-secondary)",
      border: "none",
      borderRadius: "var(--r-md)",
      fontFamily: "var(--font-sans)",
      fontSize: 13,
      fontWeight: active ? 500 : 400,
      letterSpacing: "-0.005em",
      textAlign: "left",
      transition: "all 120ms ease",
      position: "relative",
    }}
    onMouseEnter={(e) => {
      if (!active) {
        e.currentTarget.style.color = "var(--text-primary)";
        e.currentTarget.style.background = "var(--bg-card-2)";
      }
    }}
    onMouseLeave={(e) => {
      if (!active) {
        e.currentTarget.style.color = "var(--text-secondary)";
        e.currentTarget.style.background = "transparent";
      }
    }}
  >
    {active && (
      <span
        style={{
          position: "absolute",
          left: -16,
          top: 6,
          bottom: 6,
          width: 2,
          background: "var(--brand-500)",
          borderRadius: 2,
        }}
      />
    )}
    <Icon name={icon} size={15} />
    <span style={{ flex: 1 }}>{label}</span>
    {count !== undefined && (
      <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-tertiary)" }}>
        {count}
      </span>
    )}
  </button>
);

const SidebarSection = ({ label, children }) => (
  <div style={{ marginBottom: 18 }}>
    <div
      style={{
        fontFamily: "var(--font-mono)",
        fontSize: 10,
        fontWeight: 500,
        color: "var(--text-tertiary)",
        textTransform: "uppercase",
        letterSpacing: "0.08em",
        padding: "0 10px",
        marginBottom: 6,
      }}
    >
      {label}
    </div>
    <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>{children}</div>
  </div>
);

/* ─────────────────────────── BRAND ─────────────────────────── */

const Wordmark = ({ size = 18 }) => (
  <span
    style={{
      display: "inline-flex",
      alignItems: "center",
      gap: 8,
      fontFamily: "var(--font-sans)",
      fontWeight: 600,
      fontSize: size,
      color: "var(--text-primary)",
      letterSpacing: "-0.025em",
    }}
  >
    <BrandGlyph size={size + 6} />
    App Médica
    <span style={{ fontFamily: "var(--font-mono)", color: "var(--ai-accent)", fontWeight: 500, fontSize: size * 0.85 }}>
      ·AI
    </span>
  </span>
);

const BrandGlyph = ({ size = 24 }) => (
  <span
    style={{
      display: "inline-flex",
      alignItems: "center",
      justifyContent: "center",
      width: size,
      height: size,
      background: "linear-gradient(135deg, var(--brand-500), var(--ai-accent))",
      borderRadius: Math.round(size * 0.22),
      fontFamily: "var(--font-sans)",
      fontWeight: 700,
      fontSize: size * 0.55,
      color: "#0A0E14",
      letterSpacing: "-0.04em",
    }}
  >
    A
  </span>
);

/* ─────────────────────────── EXPORT ────────────────────────── */

Object.assign(window, {
  Button, IconButton, KbdHint,
  Input, Field, Toggle,
  Badge, StatusDot,
  Card, SectionHeader,
  Alert, KPI, Table,
  SidebarItem, SidebarSection,
  Wordmark, BrandGlyph,
});

})();
</script>
<script type="text/babel">
;(function(){
// AISurfaces.jsx — IA-specific components: ai-pulse, ai-trace, ai-surface
// Suggestion cards, transcription line, sparkline.
// Requires Components.jsx + Icons.jsx loaded first.

const AIPulse = ({ size = 8, label }) => (
  <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
    <StatusDot variant="ai" pulse />
    {label && (
      <span
        style={{
          fontFamily: "var(--font-mono)",
          fontSize: 11,
          color: "var(--ai-accent)",
          textTransform: "uppercase",
          letterSpacing: "0.06em",
        }}
      >
        {label}
      </span>
    )}
  </span>
);

const AITrace = ({ children, source }) => (
  <span
    title={source}
    style={{
      background: "var(--ai-accent-soft)",
      borderBottom: "1px dashed var(--ai-accent-line)",
      padding: "0 2px",
      borderRadius: 2,
      cursor: "help",
      color: "var(--text-primary)",
    }}
  >
    {children}
  </span>
);

const AISurface = ({ title, children, kbd, action }) => (
  <div
    style={{
      position: "relative",
      background: "linear-gradient(180deg, rgba(102,217,210,0.04), transparent 30%), var(--bg-card)",
      border: "1px solid var(--ai-accent-line)",
      borderRadius: "var(--r-lg)",
      padding: 18,
      overflow: "hidden",
    }}
  >
    <span
      aria-hidden
      style={{
        position: "absolute",
        top: 0,
        left: 0,
        right: 0,
        height: 1,
        background: "linear-gradient(90deg, transparent, var(--ai-accent), transparent)",
      }}
    />
    {(title || kbd) && (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <AIPulse />
          <span style={{ fontSize: 13, fontWeight: 500, color: "var(--text-primary)", letterSpacing: "-0.005em" }}>
            {title}
          </span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {kbd && <KbdHint>{kbd}</KbdHint>}
          {action}
        </div>
      </div>
    )}
    {children}
  </div>
);

const AISuggestion = ({ title, body, onAccept, onDismiss }) => (
  <div
    style={{
      display: "flex",
      gap: 12,
      padding: 12,
      background: "var(--ai-accent-soft)",
      border: "1px solid var(--ai-accent-line)",
      borderRadius: "var(--r-md)",
    }}
  >
    <div style={{ color: "var(--ai-accent)", marginTop: 1, flexShrink: 0 }}>
      <Icon name="sparkle" size={14} />
    </div>
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--text-primary)", marginBottom: 4 }}>
        {title}
      </div>
      <div style={{ fontSize: 12, color: "var(--text-secondary)", lineHeight: 1.5, marginBottom: 10 }}>
        {body}
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <Button variant="ai" size="sm" onClick={onAccept}>
          Aceptar
        </Button>
        <Button variant="ghost" size="sm" onClick={onDismiss}>
          Descartar
        </Button>
      </div>
    </div>
  </div>
);

const Sparkline = ({ data, width = 80, height = 24, variant = "ai" }) => {
  const colors = {
    ai:       "var(--ai-accent)",
    positive: "var(--clinical-positive)",
    warning:  "var(--clinical-warning)",
    critical: "var(--clinical-critical)",
    brand:    "var(--brand-500)",
  };
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const stepX = width / (data.length - 1);
  const points = data.map((v, i) => [i * stepX, height - ((v - min) / range) * (height - 4) - 2]);
  const path = points.map(([x, y], i) => `${i === 0 ? "M" : "L"}${x},${y}`).join(" ");
  const area = `${path} L${width},${height} L0,${height} Z`;
  const id = `spk-${Math.random().toString(36).slice(2, 8)}`;
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={colors[variant]} stopOpacity="0.18" />
          <stop offset="100%" stopColor={colors[variant]} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`} />
      <path d={path} fill="none" stroke={colors[variant]} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

const StockBar = ({ value, max, variant = "positive" }) => {
  const colors = {
    positive: "var(--clinical-positive)",
    warning:  "var(--clinical-warning)",
    critical: "var(--clinical-critical)",
    brand:    "var(--brand-500)",
  };
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div
        style={{
          flex: 1,
          height: 4,
          background: "var(--bg-base)",
          borderRadius: 2,
          overflow: "hidden",
        }}
      >
        <div
          style={{
            width: `${pct}%`,
            height: "100%",
            background: colors[variant],
            transition: "width 200ms ease",
          }}
        />
      </div>
      <span
        style={{
          fontFamily: "var(--font-mono)",
          fontSize: 11,
          color: "var(--text-secondary)",
          fontFeatureSettings: '"tnum"',
          minWidth: 50,
          textAlign: "right",
        }}
      >
        {value}/{max}
      </span>
    </div>
  );
};

const Avatar = ({ name, size = 28, variant = "neutral" }) => {
  const initials = (name || "")
    .split(" ")
    .map((s) => s[0])
    .filter(Boolean)
    .slice(0, 2)
    .join("")
    .toUpperCase();
  const variants = {
    neutral: { bg: "var(--bg-card-2)", fg: "var(--text-secondary)", border: "var(--border-default)" },
    brand:   { bg: "rgba(30,136,229,.18)", fg: "var(--brand-300)", border: "rgba(30,136,229,.3)" },
    ai:      { bg: "var(--ai-accent-soft)", fg: "var(--ai-accent)", border: "var(--ai-accent-line)" },
  };
  const v = variants[variant];
  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        width: size,
        height: size,
        background: v.bg,
        color: v.fg,
        border: `1px solid ${v.border}`,
        borderRadius: "50%",
        fontFamily: "var(--font-mono)",
        fontSize: Math.round(size * 0.4),
        fontWeight: 500,
        letterSpacing: "-0.01em",
        flexShrink: 0,
      }}
    >
      {initials}
    </span>
  );
};

const PatientRow = ({ name, mrn, time, status, statusVariant }) => (
  <div
    style={{
      display: "grid",
      gridTemplateColumns: "auto 1fr auto auto",
      alignItems: "center",
      gap: 12,
      padding: "10px 12px",
      borderRadius: "var(--r-md)",
      transition: "background 100ms ease",
      cursor: "default",
    }}
    onMouseEnter={(e) => (e.currentTarget.style.background = "var(--bg-card-2)")}
    onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}
  >
    <Avatar name={name} size={28} />
    <div style={{ minWidth: 0 }}>
      <div style={{ fontSize: 13, fontWeight: 500, color: "var(--text-primary)", letterSpacing: "-0.005em" }}>
        {name}
      </div>
      <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-tertiary)" }}>
        {mrn}
      </div>
    </div>
    <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-secondary)" }}>{time}</span>
    {status && <Badge variant={statusVariant || "neutral"}>{status}</Badge>}
  </div>
);

Object.assign(window, {
  AIPulse, AITrace, AISurface, AISuggestion,
  Sparkline, StockBar, Avatar, PatientRow,
});

})();
</script>

/* ─── Demanda con IA — la pestaña estrella ─── */
const DPDemanda = ({ p }) => {
  // 12 months historical + 3 prediction
  const points = [];
  for (let i = 0; i < 15; i++) {
    const base = p.consumoDia * 30;
    const seasonal = Math.sin(i / 2.5) * base * 0.15;
    const trend = (i / 15) * base * 0.2 * (p.tendencia === "up" ? 1 : p.tendencia === "down" ? -1 : 0);
    const noise = (Math.random() - 0.5) * base * 0.1;
    points.push({ x: i, y: base + seasonal + trend + noise, future: i >= 12 });
  }
  const max = Math.max(...points.map(p => p.y));
  const min = Math.min(...points.map(p => p.y)) * 0.85;

  const W = 760, H = 220;
  const sx = (i) => (i / (points.length - 1)) * W;
  const sy = (v) => H - ((v - min) / (max - min)) * (H - 20) - 10;

  const linePath = points.filter(p => !p.future).map((pt, i) => `${i === 0 ? "M" : "L"}${sx(pt.x)},${sy(pt.y)}`).join(" ");
  const predPath = points.slice(11).map((pt, i) => `${i === 0 ? "M" : "L"}${sx(pt.x)},${sy(pt.y)}`).join(" ");
  const areaPath = `M${sx(0)},${H} ` + points.filter(p => !p.future).map(pt => `L${sx(pt.x)},${sy(pt.y)}`).join(" ") + ` L${sx(11)},${H} Z`;
  // confidence band on prediction
  const bandTop = points.slice(11).map((pt, i) => `${i === 0 ? "M" : "L"}${sx(pt.x)},${sy(pt.y * 1.1)}`).join(" ");
  const bandBot = points.slice(11).map((pt, i) => `L${sx(pt.x)},${sy(pt.y * 0.92)}`).reverse().join(" ");

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <AISurface title="Predicción de demanda · 12 meses + 90 días" kbd="ML">
        <div style={{ position: "relative" }}>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: "visible" }}>
            {[0,1,2,3,4].map(i => (
              <line key={i} x1="0" x2={W} y1={(H/4)*i + 5} y2={(H/4)*i + 5} stroke="var(--border-subtle)" strokeDasharray="2 4" strokeWidth="1"/>
            ))}
            {/* Vertical separator at "now" */}
            <line x1={sx(11)} x2={sx(11)} y1={0} y2={H} stroke="var(--ai-accent-line)" strokeDasharray="4 4" strokeWidth="1"/>
            <text x={sx(11) + 6} y={14} style={{ fontFamily: "var(--font-mono)", fontSize: 9, fill: "var(--ai-accent)", textTransform: "uppercase", letterSpacing: "0.1em" }}>HOY</text>
            <path d={areaPath} fill="var(--brand-500)" opacity="0.12"/>
            <path d={linePath} fill="none" stroke="var(--brand-500)" strokeWidth="1.8"/>
            {/* confidence band */}
            <path d={`${bandTop} ${bandBot} Z`} fill="var(--ai-accent)" opacity="0.1"/>
            <path d={predPath} fill="none" stroke="var(--ai-accent)" strokeWidth="1.8" strokeDasharray="3 3"/>
            {points.map((pt, i) => (
              <circle key={i} cx={sx(pt.x)} cy={sy(pt.y)} r={i === 11 ? 4 : 2.5}
                fill={pt.future ? "var(--ai-accent)" : "var(--brand-500)"} stroke="var(--bg-card)" strokeWidth="1.5"/>
            ))}
          </svg>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 10, fontFamily: "var(--font-mono)", color: "var(--text-tertiary)" }}>
            <span>may '25</span><span>ago '25</span><span>nov '25</span><span>feb '26</span><span>abr '26</span><span style={{ color: "var(--ai-accent)" }}>+30d</span><span style={{ color: "var(--ai-accent)" }}>+90d</span>
          </div>
        </div>
      </AISurface>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
        <Card>
          <div style={{ fontSize: 10, color: "var(--text-tertiary)", fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Promedio mensual</div>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 22, marginTop: 6 }}>{Math.round(p.consumoDia * 30)} pz</div>
          <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 2 }}>últimos 12 meses</div>
        </Card>
        <Card>
          <div style={{ fontSize: 10, color: "var(--text-tertiary)", fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Varianza</div>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 22, marginTop: 6 }}>±{Math.round(p.consumoDia*30*0.12)} pz</div>
          <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 2 }}>desviación estándar</div>
        </Card>
        <Card>
          <div style={{ fontSize: 10, color: "var(--text-tertiary)", fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Tendencia 90d</div>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 22, marginTop: 6, color: p.tendencia === "up" ? "var(--clinical-positive)" : p.tendencia === "down" ? "var(--clinical-critical)" : "var(--text-primary)" }}>
            {p.tendencia === "up" ? "↑ +18%" : p.tendencia === "down" ? "↓ −9%" : "→ ±2%"}
          </div>
          <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 2 }}>vs mismo periodo</div>
        </Card>
      </div>

      <AISurface title="Sugerencias del modelo" kbd="3 nuevas">
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <AISuggestion title={`Subir par level de ${p.par} a ${Math.round(p.par * 1.4)} unidades`}
            body={`El consumo de las últimas 4 semanas supera el par actual con probabilidad de 92%. Subir el par previene 2 quiebres proyectados en los próximos 30 días.`}/>
          <AISuggestion title="Cambiar proveedor primario por mejor lead time"
            body="Pisa entrega en 3.1 días promedio vs 4.8 del actual. Sin diferencias significativas de costo o calidad reportadas."/>
          <AISuggestion title="Eventos detectados que afectaron demanda"
            body={`Pico identificado en febrero: ${p.tendencia === "up" ? "+38%" : "+22%"} sobre línea base. Causa probable: brote estacional de infecciones respiratorias en la zona.`}/>
        </div>
      </AISurface>
    </div>
  );
};

<script type="text/babel">
;(function(){
const { useState, useEffect, useCallback } = React;
const {
  Icon, Sparkline,
  Button, IconButton, KbdHint, Input, Field, Toggle,
  Badge, StatusDot, Card, SectionHeader, Alert, KPI, Table,
  SidebarItem, SidebarSection, Wordmark, BrandGlyph,
  AIPulse, AITrace, AISurface, AISuggestion, StockBar, Avatar, PatientRow,
  PRODUCTOS, LOTES, ALERTAS, RECEPCIONES, OCS, ORDENES_COMPRA, CONTEOS,
  PENDIENTES, INSIGHTS, MOVIMIENTOS, LIBRO_CONTROLADOS,
  fmtMXN, fmtMXNd, fmtNum, fmtDate, addDays, sparklineData, TODAY,
  SidebarNav, Topbar, CommandPalette, PageHeader, NAV,
  Dashboard, KPICard, BarChart,
  Existencias, DetalleProducto, FilterGroup, Check, Pill,
  Lotes, Recepciones, OrdenesCompra, ConteoCiclico, Alertas, Controlados,
  Reportes, Movimientos, Productos, Ubicaciones, InsightsIA, Login,
} = window;

const SCREEN_LABELS = {
  dashboard:   { title: "Dashboard",            crumbs: ["Operación", "Dashboard"] },
  existencias: { title: "Existencias",          crumbs: ["Operación", "Existencias"] },
  lotes:       { title: "Lotes y caducidades",  crumbs: ["Operación", "Lotes y caducidades"] },
  movimientos: { title: "Movimientos",          crumbs: ["Operación", "Movimientos"] },
  recepciones: { title: "Recepciones",          crumbs: ["Flujos", "Recepciones"] },
  oc:          { title: "Órdenes de compra",    crumbs: ["Flujos", "Órdenes de compra"] },
  conteo:      { title: "Conteo cíclico",       crumbs: ["Flujos", "Conteo cíclico"] },
  traspasos:   { title: "Traspasos",            crumbs: ["Flujos", "Traspasos"] },
  controlados: { title: "Controlados",          crumbs: ["Control", "Controlados"] },
  alertas:     { title: "Alertas",              crumbs: ["Control", "Alertas"] },
  auditoria:   { title: "Auditoría",            crumbs: ["Control", "Auditoría"] },
  productos:   { title: "Productos",            crumbs: ["Catálogos", "Productos"] },
  ubicaciones: { title: "Ubicaciones",          crumbs: ["Catálogos", "Ubicaciones"] },
  proveedores: { title: "Proveedores",          crumbs: ["Catálogos", "Proveedores"] },
  reportes:    { title: "Reportes",             crumbs: ["Inteligencia", "Reportes"] },
  insights:    { title: "Insights IA",          crumbs: ["Inteligencia", "Insights IA"] },
};

const ComingSoon = ({ name, icon }) => (
  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 480 }}>
    <div style={{
      maxWidth: 480, textAlign: "center",
      background: "var(--bg-card)", border: "1px solid var(--border-subtle)",
      borderRadius: "var(--r-xl)", padding: "40px 32px",
    }}>
      <div style={{
        width: 56, height: 56, borderRadius: 14,
        background: "var(--bg-card-2)", border: "1px solid var(--border-subtle)",
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        color: "var(--text-secondary)", marginBottom: 16,
      }}>
        <Icon name={icon || "package"} size={24} />
      </div>
      <h2 style={{ margin: "0 0 8px 0", fontSize: 18, fontWeight: 600, letterSpacing: "-0.01em" }}>{name}</h2>
      <p style={{ margin: 0, fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.55 }}>
        Esta sección está fuera del alcance del MVP. Quedará habilitada en la siguiente fase del módulo de inventario.
      </p>
      <div style={{
        marginTop: 20, padding: "8px 12px", display: "inline-flex", gap: 8, alignItems: "center",
        background: "var(--bg-card-2)", border: "1px solid var(--border-subtle)",
        borderRadius: 999, fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-tertiary)",
      }}>
        <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--clinical-warning)" }}></span>
        Backlog · Q3 2026
      </div>
    </div>
  </div>
);

const App = () => {
  const [authed, setAuthed] = useState(true);
  const [route, setRoute] = useState("dashboard");
  const [productoId, setProductoId] = useState(null);
  const [palette, setPalette] = useState(false);

  useEffect(() => {
    let gPressed = false;
    let gTimer = null;
    const onKey = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      const tag = (e.target.tagName || "").toLowerCase();
      const inField = tag === "input" || tag === "textarea" || e.target.isContentEditable;

      if (meta && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setPalette(p => !p);
        return;
      }
      if (e.key === "Escape") {
        if (palette) setPalette(false);
        return;
      }
      if (inField || meta) return;

      if (e.key.toLowerCase() === "g") {
        gPressed = true;
        clearTimeout(gTimer);
        gTimer = setTimeout(() => { gPressed = false; }, 800);
        return;
      }
      if (gPressed) {
        const map = { d: "dashboard", e: "existencias", l: "lotes", a: "alertas", c: "controlados", o: "oc", r: "recepciones", i: "insights", m: "movimientos", p: "productos" };
        const target = map[e.key.toLowerCase()];
        if (target) { setRoute(target); setProductoId(null); gPressed = false; }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [palette]);

  const navigate = useCallback((id) => {
    if (typeof id === "string" && id.startsWith("producto:")) {
      const pid = id.slice("producto:".length);
      setProductoId(pid);
      setRoute("existencias");
    } else {
      setRoute(id);
      setProductoId(null);
    }
  }, []);

  if (!authed) {
    return <Login onLogin={() => setAuthed(true)} />;
  }

  const meta = SCREEN_LABELS[route] || { title: route, crumbs: [route] };
  let breadcrumb = ["Almacén Central", ...meta.crumbs];

  let page = null;
  if (route === "dashboard")        page = <Dashboard onNav={navigate} />;
  else if (route === "existencias") {
    if (productoId) {
      const p = PRODUCTOS.find(x => x.id === productoId);
      breadcrumb = ["Almacén Central", "Operación", "Existencias", p ? p.nombre : "Producto"];
      page = <DetalleProducto id={productoId} onBack={() => setProductoId(null)} />;
    } else {
      page = <Existencias onProducto={(id) => setProductoId(id)} />;
    }
  }
  else if (route === "lotes")       page = <Lotes />;
  else if (route === "recepciones") page = <Recepciones />;
  else if (route === "oc")          page = <OrdenesCompra />;
  else if (route === "conteo")      page = <ConteoCiclico />;
  else if (route === "alertas")     page = <Alertas />;
  else if (route === "controlados") page = <Controlados />;
  else if (route === "reportes")    page = <Reportes />;
  else if (route === "movimientos") page = <Movimientos />;
  else if (route === "productos")   page = <Productos />;
  else if (route === "ubicaciones") page = <Ubicaciones />;
  else if (route === "insights")    page = <InsightsIA />;
  else if (route === "traspasos")   page = <ComingSoon name="Traspasos" icon="truck" />;
  else if (route === "auditoria")   page = <ComingSoon name="Auditoría" icon="file-search" />;
  else if (route === "proveedores") page = <ComingSoon name="Proveedores" icon="building" />;
  else                              page = <ComingSoon name={meta.title} />;

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "var(--bg-page)" }}>
      <SidebarNav active={route} onNav={navigate} />

      <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <Topbar
          breadcrumb={breadcrumb}
          onCmdK={() => setPalette(true)}
          actions={
            <button onClick={() => setAuthed(false)} title="Cerrar sesión"
              style={{
                height: 32, padding: "0 10px",
                background: "transparent", color: "var(--text-tertiary)",
                border: "1px solid var(--border-subtle)", borderRadius: "var(--r-md)",
                fontSize: 11.5, fontFamily: "var(--font-mono)", display: "inline-flex", alignItems: "center", gap: 6,
              }}>
              <Icon name="logout" size={12}/> SALIR
            </button>
          }
        />

        <main style={{ flex: 1, padding: "28px 32px 64px 32px", maxWidth: 1640, width: "100%", margin: "0 auto" }}>
          {page}
        </main>
      </div>

      <CommandPalette open={palette} onClose={() => setPalette(false)} onNav={navigate} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();
</script>

</body>
