  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-------------- */\n:root {\n  /* ---------- Color / surfaces ---------- */\n  --finem-bg:          #020410;  /* theme color; near-black with blue bias */\n  --finem-bg-elev-1:   #0a0a14;  /* cards on dark */\n  --finem-bg-elev-2:   #0a0a1a;  /* service card bg */\n  --finem-ink-on-light:#09122b;  /* favicon / logo on light bg */\n\n  /* ---------- Text ---------- */\n  --finem-fg-1:  rgba(255, 255, 255, 0.95);\n  --finem-fg-2:  rgba(226, 232, 240, 1);     /* slate-200 */\n  --finem-fg-3:  rgba(148, 163, 184, 0.85);  /* slate-400 */\n  --finem-fg-4:  rgba(148, 163, 184, 0.5);   /* slate-400/50 — captions */\n  --finem-fg-muted: rgba(255, 255, 255, 0.12);\n\n  /* ---------- Brand accents (the “blob trio” + gold) ---------- */\n  --finem-orange:      #f97316;  /* primary warm accent */\n  --finem-orange-400:  #fb923c;\n  --finem-orange-200:  rgba(253, 186, 116, 0.7); /* orange-200/70 */\n  --finem-amber:       #f59e0b;\n  --finem-purple:      #7c3aed;\n  --finem-purple-600:  #6d28d9;\n  --finem-teal:        #14b8a6;\n  --finem-blue:        #3b82f6;\n  --finem-gold:        #c8a96e;  /* Mike4Visual collab accent */\n  --finem-gold-light:  #d4ba85;\n\n  /* Semantic */\n  --finem-success: #4caf50;\n  --finem-danger:  #ef4444;\n\n  /* ---------- Borders / dividers ---------- */\n  --finem-border-soft:   rgba(255, 255, 255, 0.06);\n  --finem-border-medium: rgba(255, 255, 255, 0.10);\n  --finem-border-strong: rgba(255, 255, 255, 0.12);\n  --finem-border-hot:    rgba(249, 115, 22, 0.40);\n\n  /* ---------- Shadows (always dark-bg friendly) ---------- */\n  --finem-shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.05);\n  --finem-shadow-md: 0 12px 40px rgba(0, 0, 0, 0.10);\n  --finem-shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.30);\n  --finem-glow-orange: 0 0 30px rgba(249, 115, 22, 0.40);\n  --finem-glow-blue:   0 0 30px rgba(59, 130, 246, 0.40);\n  --finem-glow-gold:   0 16px 40px -8px rgba(200, 169, 110, 0.30);\n\n  /* ---------- Radii ---------- */\n  --finem-radius-sm: 8px;\n  --finem-radius-md: 16px;\n  --finem-radius-lg: 24px;      /* rounded-3xl */\n  --finem-radius-pill: 9999px;  /* pill CTAs, badges */\n\n  /* ---------- Fonts ---------- */\n  --finem-font-sans:    'Circular Std', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;\n  --finem-font-display: 'Playfair Display', Georgia, serif;   /* used sparingly, headers in proposals */\n  --finem-font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* ---------- Display type scale (hero, section heads) ---------- */\n  --finem-text-display:  clamp(3rem, 11vw, 8rem);       /* 48 → 128px */\n  --finem-text-h1:       clamp(2.25rem, 6vw, 5rem);     /* 36 → 80px  */\n  --finem-text-h2:       clamp(1.75rem, 4.5vw, 3.25rem);/* 28 → 52px  */\n  --finem-text-h3:       clamp(1.25rem, 2.2vw, 1.875rem);\n  --finem-text-body-lg:  1.125rem;                       /* 18 */\n  --finem-text-body:     1rem;                           /* 16 */\n  --finem-text-small:    0.875rem;                       /* 14 */\n  --finem-text-caption:  0.75rem;                        /* 12 */\n  --finem-text-micro:    0.625rem;                       /* 10 — uppercase labels */\n  --finem-text-nano:     0.5625rem;                      /* 9  — tracking-[0.3em] eyebrows */\n\n  /* ---------- Tracking (letter-spacing) ---------- */\n  --finem-tracking-eyebrow: 0.3em;    /* UPPERCASE EYEBROW */\n  --finem-tracking-cta:     0.2em;    /* button labels */\n  --finem-tracking-display: -0.04em;  /* tight display headings */\n  --finem-tracking-body:    0;\n\n  /* ---------- Spacing scale ---------- */\n  --finem-space-1: 4px;\n  --finem-space-2: 8px;\n  --finem-space-3: 12px;\n  --finem-space-4: 16px;\n  --finem-space-6: 24px;\n  --finem-space-8: 32px;\n  --finem-space-12: 48px;\n  --finem-space-16: 64px;\n  --finem-space-24: 96px;\n  --finem-space-32: 128px;\n  --finem-space-40: 160px;\n\n  /* ---------- Motion ---------- */\n  --finem-ease-brand: cubic-bezier(0.25, 0.4, 0.25, 1);  /* signature easing */\n  --finem-duration-fast: 200ms;\n  --finem-duration-med:  500ms;\n  --finem-duration-slow: 900ms;\n}\n\n/* -------------------------------------------------------------------------- */\n/* 3. FINEM GROWTH — warm, cream, peach                                        */\n/* -------------------------------------------------------------------------- */\n:root {\n  --growth-bg:          #FDF6F0;  /* soft cream — primary surface */\n  --growth-bg-2:        #FFF0E6;  /* deeper cream for section alternation */\n  --growth-card:        rgba(255, 255, 255, 0.88);  /* glass card */\n  --growth-card-strong: rgba(255, 255, 255, 0.95);\n\n  --growth-ink:         #1A1A2E;  /* primary text */\n  --growth-ink-muted:   #5C5C7A;  /* body / muted */\n  --growth-ink-faint:   rgba(92, 92, 122, 0.6);\n\n  --growth-orange:      #E8845C;  /* primary CTA — peach */\n  --growth-orange-dark: #D4703F;  /* hover */\n  --growth-orange-soft: #F0A07A;\n  --growth-peach-tint:  #F5C4A1;\n  --growth-peach-bg:    rgba(232, 132, 92, 0.10); /* icon chips */\n  --growth-peach-bg-2:  #FFF3EC;                   /* bonus block bg */\n  --growth-peach-bg-3:  #FFF8F2;\n\n  --growth-blue:        #3B7DD8;  /* secondary accent — trust / links */\n  --growth-blue-light:  #5BA3E6;\n  --growth-blue-dark:   #2563C8;  /* link hover */\n  --growth-lilac:       #C4A8D4;  /* tertiary hero blob */\n\n  --growth-success: #4CAF50;\n\n  --growth-border-soft:   rgba(0, 0, 0, 0.06);\n  --growth-border-medium: rgba(0, 0, 0, 0.08);\n\n  --growth-shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.05);\n  --growth-shadow-md: 0 12px 36px rgba(232, 132, 92, 0.12);\n  --growth-shadow-lg: 0 20px 60px rgba(232, 132, 92, 0.25);\n\n  --growth-font-sans: 'Rubik', 'Plus Jakarta Sans', system-ui, sans-serif;\n\n  --growth-radius-sm: 12px;\n  --growth-radius-md: 16px;\n  --growth-radius-lg: 24px;\n  --growth-radius-xl: 32px;\n}\n\n/* -------------------------------------------------------------------------- */\n/* 4. SEMANTIC ROLES — pick one brand mode per page (via class on <body>)      */\n/*    Default is finem-dark. Set .brand-growth to switch to Growth tokens.    */\n/* -------------------------------------------------------------------------- */\nbody {\n  font-family: var(--finem-font-sans);\n  color: var(--finem-fg-1);\n  background-color: var(--finem-bg);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\nbody.brand-growth {\n  font-family: var(--growth-font-sans);\n  color: var(--growth-ink);\n  background-color: var(--growth-bg);\n}\n\n/* -------------------------------------------------------------------------- */\n/* 5. TYPE PRIMITIVES                                                          */\n/* -------------------------------------------------------------------------- */\n\n/* Eyebrow — the signature label above every section */\n.ds-eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n  font-size: var(--finem-text-nano);\n  font-weight: 700;\n  letter-spacing: var(--finem-tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--finem-orange);\n}\n.ds-eyebrow::before {\n  content: '';\n  width: 32px;\n  height: 1px;\n  background: currentColor;\n  opacity: 0.6;\n}\n\n/* Display — hero slogans. Never break more than 2 lines. */\n.ds-display {\n  font-family: var(--finem-font-sans);\n  font-weight: 800;\n  font-size: var(--finem-text-display);\n  line-height: 1;\n  letter-spacing: var(--finem-tracking-display);\n  color: var(--finem-fg-1);\n  text-wrap: balance;\n}\n\n/* H1 — section openers */\n.ds-h1 {\n  font-family: var(--finem-font-sans);\n  font-weight: 700;\n  font-size: var(--finem-text-h1);\n  line-height: 1.05;\n  letter-spacing: -0.03em;\n  color: var(--finem-fg-1);\n  text-wrap: balance;\n}\n\n.ds-h2 {\n  font-family: var(--finem-font-sans);\n  font-weight: 700;\n  font-size: var(--finem-text-h2);\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n  color: var(--finem-fg-1);\n}\n\n.ds-h3 {\n  font-family: var(--finem-font-sans);\n  font-weight: 700;\n  font-size: var(--finem-text-h3);\n  line-height: 1.25;\n  color: var(--finem-fg-1);\n}\n\n/* Body */\n.ds-body-lg {\n  font-size: var(--finem-text-body-lg);\n  line-height: 1.65;\n  color: var(--finem-fg-3);\n  font-weight: 300;\n}\n.ds-body {\n  font-size: var(--finem-text-body);\n  line-height: 1.6;\n  color: var(--finem-fg-3);\n}\n.ds-body-small {\n  font-size: var(--finem-text-small);\n  line-height: 1.5;\n  color: var(--finem-fg-3);\n}\n\n/* Caption — supporting text under metrics, card footers */\n.ds-caption {\n  font-size: var(--finem-text-caption);\n  line-height: 1.5;\n  color: var(--finem-fg-4);\n}\n\n/* Micro label — the tiny UPPERCASE label on pills */\n.ds-micro {\n  font-size: var(--finem-text-micro);\n  letter-spacing: var(--finem-tracking-cta);\n  text-transform: uppercase;\n  font-weight: 700;\n  color: var(--finem-fg-2);\n}\n\n/* Gradient text — signature Finem move on second-half of hero heads */\n.ds-text-gradient {\n  background: linear-gradient(90deg, var(--finem-orange-400) 0%, #ffffff 50%, var(--finem-purple) 100%);\n  background-size: 200% auto;\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  animation: ds-gradient-x 4s linear infinite;\n}\n.ds-text-gradient-warm {\n  background: linear-gradient(90deg, var(--finem-orange-400) 0%, var(--finem-amber) 50%, var(--finem-orange) 100%);\n  background-size: 200% auto;\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  animation: ds-gradient-x 4s linear infinite;\n}\n@keyframes ds-gradient-x {\n  0%   { background-position: 0% 50%; }\n  50%  { background-position: 100% 50%; }\n  100% { background-position: 0% 50%; }\n}\n\n/* -------------------------------------------------------------------------- */\n/* 6. GROWTH OVERRIDES — apply inside .brand-growth scope                      */\n/* -------------------------------------------------------------------------- */\n.brand-growth .ds-eyebrow { color: var(--growth-orange); }\n.brand-growth .ds-display,\n.brand-growth .ds-h1,\n.brand-growth .ds-h2,\n.brand-growth .ds-h3 { color: var(--growth-ink); }\n.brand-growth .ds-body-lg,\n.brand-growth .ds-body,\n.brand-growth .ds-body-small { color: var(--growth-ink-muted); }\n.brand-growth .ds-caption   { color: var(--growth-ink-faint); }\n\n/* -------------------------------------------------------------------------- */\n/* 7. UTILITY — the “blob” background trio (signature visual motif)            */\n/*    Use on a relatively-positioned parent with overflow:hidden and          */\n/*    apply `.ds-blob-stage` to a wrapper div INSIDE that parent (it holds    */\n/*    blur so we only pay the cost once).                                     */\n/* -------------------------------------------------------------------------- */\n.ds-blob-stage {\n  position: absolute;\n  inset: 0;\n  overflow: hidden;\n  pointer-events: none;\n  filter: blur(90px);\n  transform: translate3d(0, 0, 0);\n}\n.ds-blob {\n  position: absolute;\n  border-radius: 9999px;\n  will-change: transform;\n}\n.ds-blob--orange { background: var(--finem-orange); opacity: 0.5; }\n.ds-blob--purple { background: var(--finem-purple); opacity: 0.35; }\n.ds-blob--teal   { background: var(--finem-teal);   opacity: 0.35; }\n.ds-blob--blue   { background: var(--finem-blue);   opacity: 0.30; }\n.ds-blob--gold   { background: var(--finem-gold);   opacity: 0.25; }\n\n.brand-growth .ds-blob--orange { background: var(--growth-orange);      opacity: 0.32; }\n.brand-growth .ds-blob--blue   { background: var(--growth-blue);        opacity: 0.28; }\n.brand-growth .ds-blob--peach  { background: var(--growth-orange-soft); opacity: 0.35; }\n.brand-growth .ds-blob--lilac  { background: var(--growth-lilac);       opacity: 0.20; }\n\n/* -------------------------------------------------------------------------- */\n/* 8. GRAIN OVERLAY — classic Finem cinematic texture. Skip on mobile/Safari. */\n/* -------------------------------------------------------------------------- */\n.ds-grain {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  mix-blend-mode: overlay;\n  opacity: 0.06;\n  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n}\n\n/* -------------------------------------------------------------------------- */\n/* 9. REDUCED MOTION                                                           */\n/* -------------------------------------------------------------------------- */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.01ms !important;\n  }\n}\n<\u002Fstyle>\n\n\n\n<style>\n/* ============================================================================\n   FINEM POLITICS — visual system\n   Built on top of the master Finem tokens, adds:\n     · signal-green tech accent\n     · partido palette (institutional)\n     · dense Linear/Vercel surface treatments\n     · custom icon language (16px grid, 1.5 stroke)\n   ========================================================================= */\n\n:root {\n  /* ---------- Politics surfaces (darker, more neutral than master) ---------- */\n  --pol-bg-0:        #05070d;   /* page */\n  --pol-bg-1:        #0a0d14;   /* card */\n  --pol-bg-2:        #0e1219;   /* elevated card */\n  --pol-bg-3:        #131822;   /* hover / row hover */\n  --pol-bg-inset:    #04060b;   /* inset wells, code blocks */\n\n  /* hairline borders (Linear-grade subtlety) */\n  --pol-line-1:  rgba(255,255,255,0.05);\n  --pol-line-2:  rgba(255,255,255,0.08);\n  --pol-line-3:  rgba(255,255,255,0.12);\n  --pol-line-4:  rgba(255,255,255,0.18);\n\n  /* ---------- Text ramp ---------- */\n  --pol-fg-0:  #ffffff;                       /* highest contrast — display */\n  --pol-fg-1:  rgba(255,255,255,0.92);        /* body strong */\n  --pol-fg-2:  rgba(235,238,245,0.78);        /* body */\n  --pol-fg-3:  rgba(180,190,210,0.62);        /* secondary */\n  --pol-fg-4:  rgba(155,168,190,0.42);        /* tertiary, captions */\n  --pol-fg-5:  rgba(155,168,190,0.26);        /* placeholder, divider labels */\n\n  /* ---------- Signal Green — Politics' own primary tech accent ---------- */\n  /* Defined in oklch to keep harmonics across light/dark.\n     A confident teal-leaning green with high chroma for data viz,\n     evokes terminals/Bloomberg/markets without partisan reading. */\n  --pol-green:        oklch(72% 0.16 162);    /* #00d28d-ish */\n  --pol-green-strong: oklch(80% 0.18 162);    /* highlights / active */\n  --pol-green-soft:   oklch(58% 0.12 162);    /* lower contrast */\n  --pol-green-bg:     oklch(72% 0.16 162 / 0.10);\n  --pol-green-line:   oklch(72% 0.16 162 / 0.32);\n  --pol-green-glow:   oklch(72% 0.16 162 / 0.45);\n\n  /* ---------- Status colors (Vercel/Linear vocabulary) ---------- */\n  --pol-status-live:    var(--pol-green);\n  --pol-status-info:    #5b8def;\n  --pol-status-warn:    #e9a23b;\n  --pol-status-danger:  #f06360;\n  --pol-status-neutral: #9aa3b2;\n\n  /* ---------- Sentimiento (escucha social) ---------- */\n  --pol-sent-pos:    var(--pol-green);\n  --pol-sent-neu:    #8a96aa;\n  --pol-sent-neg:    #f06360;\n  --pol-sent-mix:    #c89bf2;\n\n  /* ---------- Partidos (institucional, sólo cuando aplique) ---------- */\n  --party-morena: #8b1f24;\n  --party-pan:    #06529a;\n  --party-pri:    #16a04c;\n  --party-prd:    #f4c625;\n  --party-pvem:   #46892c;\n  --party-pt:     #d62027;\n  --party-mc:     #f08c1f;\n  --party-na:     #4d8aa6;\n  --party-ind:    #6b7280;\n\n  /* ---------- Type (inherits master Circular Std) ---------- */\n  --pol-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* ---------- Radii (tighter than master — Linear feel) ---------- */\n  --pol-r-1: 4px;\n  --pol-r-2: 6px;\n  --pol-r-3: 8px;\n  --pol-r-4: 12px;\n  --pol-r-5: 16px;\n  --pol-r-pill: 9999px;\n\n  /* ---------- Spacing rhythm ---------- */\n  --pol-gutter: 24px;\n}\n\n/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"6169ef41-099d-4e88-8ea6-e14d02d88b47\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f5404d13-d7a2-4d1c-9dc4-8e845156c8aa\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"466ab6f7-5aeb-4b0c-bfa9-20b7b565e0a4\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"656e1ef4-810d-450f-9593-9ba866f67307\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"90957f94-7873-4fca-bf06-f1669b9982c5\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"6e70bbe3-021e-43e9-97e2-661a6edfa020\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  background: var(--pol-bg-0);\n  color: var(--pol-fg-1);\n  font-family: 'Circular Std', system-ui, sans-serif;\n  font-feature-settings: \"ss01\",\"kern\";\n  font-variant-numeric: tabular-nums;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  margin: 0;\n  scroll-behavior: smooth;\n}\n::selection { background: var(--pol-green); color: #04060b; }\n\n/* ============================================================================\n   LAYOUT — sidebar + content (Linear docs)\n   ========================================================================= */\n\n.app {\n  display: grid;\n  grid-template-columns: 248px 1fr;\n  min-height: 100vh;\n}\n\n/* --- Sidebar --- */\n.sidebar {\n  position: sticky; top: 0;\n  height: 100vh;\n  border-right: 1px solid var(--pol-line-1);\n  padding: 20px 16px 24px;\n  background:\n    linear-gradient(180deg, rgba(0,0,0,0.20), transparent 30%),\n    var(--pol-bg-0);\n  overflow-y: auto;\n  font-size: 13px;\n}\n.sidebar::-webkit-scrollbar { width: 6px; }\n.sidebar::-webkit-scrollbar-thumb { background: var(--pol-line-2); border-radius: 3px; }\n\n.sb-brand {\n  display: flex; align-items: center; gap: 10px;\n  padding: 6px 8px 24px; margin-bottom: 8px;\n  border-bottom: 1px solid var(--pol-line-1);\n}\n.sb-brand .mark {\n  width: 28px; height: 28px;\n  border-radius: 6px;\n  background: linear-gradient(135deg, var(--pol-green) 0%, oklch(60% 0.14 192) 100%);\n  display: grid; place-items: center;\n  box-shadow: 0 0 0 1px var(--pol-line-3) inset, 0 8px 22px -10px var(--pol-green-glow);\n}\n.sb-brand .mark svg { width: 16px; height: 16px; color: var(--pol-bg-0); }\n.sb-brand .label { font-weight: 600; letter-spacing: -0.01em; font-size: 14px; }\n.sb-brand .label small {\n  display: block; color: var(--pol-fg-4); font-weight: 400; font-size: 10.5px;\n  letter-spacing: 0.18em; text-transform: uppercase; margin-top: 2px;\n}\n\n.sb-section {\n  margin: 18px 0 4px;\n  padding: 0 8px;\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--pol-fg-4);\n  font-weight: 600;\n}\n.sb-link {\n  display: flex; align-items: center; gap: 9px;\n  padding: 6px 8px;\n  border-radius: 5px;\n  color: var(--pol-fg-2);\n  text-decoration: none;\n  font-size: 13px;\n  letter-spacing: -0.005em;\n  transition: background 120ms ease, color 120ms ease;\n}\n.sb-link:hover { background: var(--pol-bg-2); color: var(--pol-fg-0); }\n.sb-link svg { width: 13px; height: 13px; opacity: 0.7; flex: none; }\n.sb-link.active { background: var(--pol-bg-3); color: var(--pol-fg-0); }\n.sb-link.active svg { color: var(--pol-green); opacity: 1; }\n\n.sb-foot {\n  margin-top: 28px; padding: 10px 8px;\n  border-top: 1px solid var(--pol-line-1);\n  color: var(--pol-fg-4); font-size: 11px;\n  display: flex; justify-content: space-between; align-items: center;\n}\n.sb-foot .ver {\n  font-family: var(--pol-mono);\n  padding: 2px 6px;\n  border: 1px solid var(--pol-line-2);\n  border-radius: 4px;\n  font-size: 10px;\n}\n\n/* --- Main content --- */\n.content { min-width: 0; }\n\n/* Top utility bar inside content */\n.topbar {\n  position: sticky; top: 0; z-index: 10;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 12px 32px;\n  border-bottom: 1px solid var(--pol-line-1);\n  background: rgba(5,7,13,0.78);\n  backdrop-filter: blur(14px) saturate(140%);\n  -webkit-backdrop-filter: blur(14px) saturate(140%);\n}\n.crumbs {\n  display: flex; align-items: center; gap: 8px;\n  font-size: 12.5px; color: var(--pol-fg-3);\n  letter-spacing: -0.005em;\n}\n.crumbs .sep { color: var(--pol-fg-5); }\n.crumbs .here { color: var(--pol-fg-1); font-weight: 500; }\n\n.kbd {\n  display: inline-flex; align-items: center; gap: 4px;\n  padding: 2px 6px;\n  font-family: var(--pol-mono);\n  font-size: 10.5px;\n  border: 1px solid var(--pol-line-3);\n  background: var(--pol-bg-2);\n  color: var(--pol-fg-2);\n  border-radius: 4px;\n  letter-spacing: 0;\n}\n.search {\n  display: flex; align-items: center; gap: 8px;\n  padding: 6px 10px 6px 30px;\n  border: 1px solid var(--pol-line-2);\n  background: var(--pol-bg-2);\n  border-radius: 7px;\n  width: 280px;\n  position: relative;\n  color: var(--pol-fg-3); font-size: 12.5px;\n}\n.search svg { position: absolute; left: 9px; width: 13px; height: 13px; color: var(--pol-fg-4); }\n.search .kbd { margin-left: auto; }\n\n/* --- Doc body --- */\n.doc {\n  max-width: 1080px;\n  margin: 0 auto;\n  padding: 56px 32px 120px;\n}\n\n/* Doc hero */\n.doc-eyebrow {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-size: 10.5px;\n  letter-spacing: 0.28em;\n  text-transform: uppercase;\n  color: var(--pol-green);\n  font-weight: 600;\n  margin-bottom: 18px;\n}\n.doc-eyebrow .dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--pol-green);\n  box-shadow: 0 0 0 4px var(--pol-green-bg);\n}\n.doc-h1 {\n  font-size: clamp(40px, 5.4vw, 64px);\n  line-height: 1.02;\n  letter-spacing: -0.035em;\n  font-weight: 700;\n  margin: 0 0 14px;\n  text-wrap: balance;\n}\n.doc-lede {\n  font-size: 18px;\n  line-height: 1.55;\n  color: var(--pol-fg-3);\n  max-width: 620px;\n  font-weight: 300;\n  margin: 0;\n  text-wrap: pretty;\n}\n.doc-meta {\n  display: flex; gap: 20px; flex-wrap: wrap;\n  margin-top: 28px; padding-top: 22px;\n  border-top: 1px dashed var(--pol-line-2);\n  font-size: 12px;\n  color: var(--pol-fg-3);\n}\n.doc-meta strong { color: var(--pol-fg-1); font-weight: 500; }\n\n/* Section */\n.sec {\n  margin-top: 88px;\n  scroll-margin-top: 80px;\n}\n.sec-head {\n  display: flex; align-items: baseline; justify-content: space-between;\n  padding-bottom: 14px;\n  border-bottom: 1px solid var(--pol-line-1);\n  margin-bottom: 28px;\n}\n.sec-head h2 {\n  font-size: 22px;\n  letter-spacing: -0.018em;\n  font-weight: 600;\n  margin: 0;\n}\n.sec-head .num {\n  font-family: var(--pol-mono);\n  font-size: 11px;\n  color: var(--pol-fg-4);\n  letter-spacing: 0;\n}\n.sec-intro {\n  color: var(--pol-fg-3);\n  font-size: 14.5px;\n  line-height: 1.65;\n  max-width: 680px;\n  margin-bottom: 28px;\n}\n\nh3.sub {\n  font-size: 14px;\n  font-weight: 600;\n  letter-spacing: 0.02em;\n  text-transform: uppercase;\n  color: var(--pol-fg-2);\n  margin: 36px 0 12px;\n}\n\n/* ============================================================================\n   PRIMITIVES — cards, grids, swatches, code, tables\n   ========================================================================= */\n\n.card {\n  background: var(--pol-bg-1);\n  border: 1px solid var(--pol-line-1);\n  border-radius: var(--pol-r-4);\n}\n.card.inset { background: var(--pol-bg-inset); }\n.card-pad { padding: 20px; }\n\n/* Caption row inside docs */\n.caption-row {\n  display: flex; align-items: center; gap: 10px;\n  font-size: 11px; color: var(--pol-fg-4);\n  font-family: var(--pol-mono);\n  letter-spacing: 0;\n}\n\n/* Mono code chip */\n.code {\n  font-family: var(--pol-mono);\n  font-size: 12px;\n  color: var(--pol-fg-2);\n  background: var(--pol-bg-inset);\n  border: 1px solid var(--pol-line-1);\n  padding: 2px 6px;\n  border-radius: 4px;\n}\n\n/* Grid helpers */\n.grid { display: grid; gap: var(--pol-gutter); }\n.cols-2 { grid-template-columns: repeat(2, 1fr); }\n.cols-3 { grid-template-columns: repeat(3, 1fr); }\n.cols-4 { grid-template-columns: repeat(4, 1fr); }\n.cols-6 { grid-template-columns: repeat(6, 1fr); }\n.cols-12 { grid-template-columns: repeat(12, 1fr); }\n\n/* Swatch */\n.swatch {\n  border: 1px solid ing: 0;\n}\n.icon-cell svg { color: var(--pol-fg-1); }\n\n.icon-frame {\n  display: grid; place-items: center;\n  width: 36px; height: 36px;\n  border: 1px solid var(--pol-line-2);\n  background: var(--pol-bg-2);\n  border-radius: var(--pol-r-3);\n}\n\n/* Icon-on-grid — illustrate construction at scale */\n.icon-construction {\n  background:\n    linear-gradient(to right, var(--pol-line-1) 1px, transparent 1px) 0 0 / calc(100%/16) 100%,\n    linear-gradient(to bottom, var(--pol-line-1) 1px, transparent 1px) 0 0 / 100% calc(100%/16),\n    var(--pol-bg-inset);\n  width: 240px; height: 240px;\n  border-radius: var(--pol-r-3);\n  border: 1px solid var(--pol-line-2);\n  display: grid; place-items: center;\n  position: relative;\n}\n.icon-construction::before, .icon-construction::after {\n  content: \"\"; position: absolute;\n  background: var(--pol-green-line);\n  pointer-events: none;\n}\n.icon-construction::before { top: calc(100% / 16); left: calc(100% / 16); right: calc(100% / 16); bottom: calc(100% / 16); border: 1px dashed var(--pol-green-line); background: transparent; }\n.icon-construction svg { width: 192px; height: 192px; color: var(--pol-fg-0); stroke-width: 1.5; }\n\n/* ============================================================================\n   STATUS DOTS / BADGES\n   ========================================================================= */\n\n.dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  display: inline-block; flex: none;\n  position: relative;\n}\n.dot.live {\n  background: var(--pol-status-live);\n  box-shadow: 0 0 0 3px oklch(72% 0.16 162 / 0.18);\n}\n.dot.live::after {\n  content: \"\";\n  position: absolute; inset: -3px;\n  border-radius: 50%;\n  border: 1px solid var(--pol-green);\n  animation: pulse-ring 1.6s cubic-bezier(0.25,0.4,0.25,1) infinite;\n  opacity: 0;\n}\n@keyframes pulse-ring {\n  0%   { transform: scale(0.8); opacity: 0.7; }\n  80%  { transform: scale(1.6); opacity: 0; }\n  100% { opacity: 0; }\n}\n.dot.info   { background: var(--pol-status-info); }\n.dot.warn   { background: var(--pol-status-warn); }\n.dot.danger { background: var(--pol-status-danger); }\n.dot.neutral{ background: var(--pol-status-neutral); }\n.dot.muted  { background: var(--pol-fg-5); }\n\n.badge {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 3px 8px;\n  font-size: 11px; line-height: 1;\n  border: 1px solid var(--pol-line-2);\n  background: var(--pol-bg-2);\n  border-radius: var(--pol-r-pill);\n  color: var(--pol-fg-2);\n  font-weight: 500;\n  letter-spacing: 0;\n  font-variant-numeric: tabular-nums;\n}\n.badge svg { width: 11px; height: 11px; }\n.badge.green   { border-color: var(--pol-green-line); color: var(--pol-green-strong); background: var(--pol-green-bg); }\n.badge.red     { border-color: rgba(240,99,96,0.35); color: #ff8a87; background: rgba(240,99,96,0.10); }\n.badge.amber   { border-color: rgba(233,162,59,0.35); color: #f1b259; background: rgba(233,162,59,0.10); }\n.badge.blue    { border-color: rgba(91,141,239,0.35); color: #8aaaff; background: rgba(91,141,239,0.10); }\n.badge.violet  { border-color: rgba(200,155,242,0.30); color: #d4b6f4; background: rgba(200,155,242,0.08); }\n.badge.neutral { border-color: var(--pol-line-2); color: var(--pol-fg-2); }\n\n.badge.solid-green {\n  background: var(--pol-green); color: var(--pol-bg-0); border-color: transparent; font-weight: 600;\n}\n\n/* Party chips (institutional palette, used carefully) */\n.party {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 3px 8px 3px 6px;\n  font-size: 11px; font-weight: 500;\n  border-radius: var(--pol-r-pill);\n  background: var(--pol-bg-2);\n  border: 1px solid var(--pol-line-2);\n}\n.party::before {\n  content: \"\"; width: 8px; height: 8px; border-radius: 2px;\n  background: var(--p, currentColor);\n}\n\n/* ============================================================================\n   KPI / DATA TILES\n   ========================================================================= */\n\n.kpi {\n  background: var(--pol-bg-1);\n  border: 1px solid var(--pol-line-1);\n  border-radius: var(--pol-r-4);\n  padding: 18px 20px 16px;\n  display: flex; flex-direction: column; gap: 10px;\n  position: relative;\n  overflow: hidden;\n}\n.kpi .lbl {\n  display: flex; align-items: center; gap: 8px;\n  font-size: 11px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--pol-fg-4);\n  font-weight: 600;\n}\n.kpi .lbl svg { width: 12px; height: 12px; color: var(--pol-fg-3); }\n.kpi .val {\n  font-size: 36px;\n  letter-spacing: -0.025em;\n  font-weight: 600;\n  line-height: 1;\n  font-feature-settings: \"tnum\",\"ss01\";\n}\n.kpi .val small {\n  font-size: 14px;\n  color: var(--pol-fg-3);\n  font-weight: 400;\n  letter-spacing: 0;\n  margin-left: 4px;\n}\n.kpi .delta {\n  display: flex; align-items: center; gap: 6px;\n  font-size: 12px;\n  color: var(--pol-fg-3);\n  font-family: var(--pol-mono);\n}\n.kpi .delta .up { color: var(--pol-green-strong); }\n.kpi .delta .down { color: #ff8a87; }\n.kpi .spark {\n  position: absolute;\n  right: 14px;\n  bottom: 12px;\n  width: 110px;\n  height: 36px;\n  pointer-events: none;\n}\n.kpi .spark .axis { stroke: rgba(255,255,255,0.06); stroke-width: 1; stroke-dasharray: 2 3; }\n.kpi .spark .area { opacity: 0.9; }\n.kpi .spark .line { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }\n.kpi .spark .end-halo { opacity: 0.35; }\n.kpi .spark .end-dot { stroke: var(--pol-bg-1); stroke-width: 1.5; }\n\n/* ============================================================================\n   TABLES\n   ========================================================================= */\n.tbl {\n  width: 100%;\n  border-collapse: separate;\n  border-spacing: 0;\n  font-size: 12.5px;\n  font-variant-numeric: tabular-nums;\n}\n.tbl thead th {\n  text-align: left;\n  font-weight: 500;\n  font-size: 10.5px;\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  color: var(--pol-fg-4);\n  padding: 10px 14px;\n  border-bottom: 1px solid var(--pol-line-2);\n  background: var(--pol-bg-1);\n}\n.tbl tbody td {\n  padding: 11px 14px;\n  border-bottom: 1px solid var(--pol-line-1);\n  color: var(--pol-fg-2);\n}\n.tbl tbody tr:hover td { background: var(--pol-bg-2); }\n.tbl tbody tr:last-child td { border-bottom: 0; }\n.tbl .num { text-align: right; font-family: var(--pol-mono); color: var(--pol-fg-1); }\n.tbl .muted { color: var(--pol-fg-4); }\n.tbl-wrap {\n  border: 1px solid var(--pol-line-1);\n  border-radius: var(--pol-r-4);\n  overflow: hidden;\n}\n\n/* ============================================================================\n   CHARTS — minimal SVG examples\n   ========================================================================= */\n.chart-card {\n  background: var(--pol-bg-1);\n  border: 1px solid var(--pol-line-1);\n  border-radius: var(--pol-r-4);\n  padding: 18px 20px 14px;\n}\n.chart-head {\n  display: flex; justify-content: space-between; align-items: flex-start;\n  margin-bottom: 14px;\n}\n.chart-title {\n  font-size: 12.5px; font-weight: 500; color: var(--pol-fg-1);\n  display: flex; align-items: center; gap: 8px;\n}\n.chart-title small {\n  font-family: var(--pol-mono); font-size: 10px;\n  color: var(--pol-fg-4); font-weight: 400; letter-spacing: 0;\n  margin-left: 4px;\n}\n.chart-legend { display: flex; gap: 14px; font-size: 11px; color: var(--pol-fg-3); }\n.chart-legend span { display: inline-flex; align-items: center; gap: 6px; }\n.chart-legend i { width: 10px; height: 2px; border-radius: 1px; display: inline-block; }\n\n/* CTA / button tokens */\n.btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 7px 12px;\n  font-size: 12.5px;\n  font-weight: 500;\n  border-radius: var(--pol-r-2);\n  border: 1px solid var(--pol-line-3);\n  background: var(--pol-bg-2);\n  color: var(--pol-fg-1);\n  cursor: pointer;\n  transition: all 140ms ease;\n  font-family: inherit;\n}\n.btn:hover { background: var(--pol-bg-3); border-color: var(--pol-line-4); }\n.btn.primary {\n  background: var(--pol-green);\n  color: var(--pol-bg-0);\n  border-color: transparent;\n  font-weight: 600;\n  box-shadow: 0 0 0 1px oklch(72% 0.16 162 / 0.4) inset, 0 8px 24px -10px var(--pol-green-glow);\n}\n.btn.primary:hover { background: var(--pol-green-strong); }\n.btn.ghost { background: transparent; border-color: var(--pol-line-2); color: var(--pol-fg-2); }\n.btn svg { width: 13px; height: 13px; }\n\n/* Sentiment bar */\n.sent-bar {\n  display: flex; height: 10px;\n  border-radius: var(--pol-r-pill);\n  overflow: hidden;\n  border: 1px solid var(--pol-line-2);\n  background: var(--pol-bg-inset);\n}\n\n/* Inline number with comparator */\n.delta-pill {\n  display: inline-flex; align-items: center; gap: 4px;\n  padding: 1px 6px 1px 4px;\n  font-size: 11px;\n  font-family: var(--pol-mono);\n  border-radius: var(--pol-r-pill);\n  background: var(--pol-bg-2);\n  border: 1px solid var(--pol-line-2);\n  color: var(--pol-fg-2);\n}\n.delta-pill.up   { color: var(--pol-green-strong); border-color: var(--pol-green-line); background: var(--pol-green-bg); }\n.delta-pill.down { color: #ff8a87; border-color: rgba(240,99,96,0.32); background: rgba(240,99,96,0.10); }\n\n/* Anchor links beside heads */\n.anchor {\n  color: var(--pol-fg-5); margin-left: 8px;\n  font-family: var(--pol-mono); font-size: 11px;\n  text-decoration: none;\n}\n.anchor:hover { color: var(--pol-green); }\n\n/* ============================================================================\n   PRINT — reasonable PDF export defaults\n   ========================================================================= */\n@media print {\n  .sidebar, .topbar { display: none; }\n  .app { grid-template-columns: 1fr; }\n  .doc { max-width: 100%; padding: 0 32px 32px; }\n  .sec { page-break-inside: avoid; }\n  body { background: white; color: black; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ============================================================\n     ICON SPRITE — def Fcircle><path d=\"M9 13v-3.5a2 2 0 1 1 4 0V13\"><\u002Fpath><\u002Fsymbol>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n\n<div class=\"app\">\n\n  <!-- ============================================================\n       SIDEBAR\n       ============================================================ -->\n  <aside class=\"sidebar\">\n    <div class=\"sb-brand\">\n      <div class=\"mark\"><svg><use href=\"#i-mark\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div class=\"label\">\n        Politics\n        <small>Finem · Sistema Visual<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sb-section\">Empezar<\u002Fdiv>\n    <a class=\"sb-link active\" href=\"#intro\"><svg class=\"fpi\"><use href=\"#i-home\"><\u002Fuse><\u002Fsvg>Introducción<\u002Fa>\n    <a class=\"sb-link\" href=\"#principios\"><svg class=\"fpi\"><use href=\"#i-shield\"><\u002Fuse><\u002Fsvg>Principios<\u002Fa>\n    <a class=\"sb-link\" href=\"#brand\"><svg class=\"fpi\"><use href=\"#i-mark\"><\u002Fuse><\u002Fsvg>Marca<\u002Fa>\n\n    <div class=\"sb-section\">Tokens<\u002Fdiv>\n    <a class=\"sb-link\" href=\"#color\"><svg class=\"fpi\"><use href=\"#i-pie\"><\u002Fuse><\u002Fsvg>Color<\u002Fa>\n    <a class=\"sb-link\" href=\"#partidos\"><svg class=\"fpi\"><use href=\"#i-flag\"><\u002Fuse><\u002Fsvg>Partidos<\u002Fa>\n    <a class=\"sb-link\" href=\"#tipografia\"><svg class=\"fpi\"><use href=\"#i-doc\"><\u002Fuse><\u002Fsvg>Tipografía<\u002Fa>\n    <a class=\"sb-link\" href=\"#espacio\"><svg class=\"fpi\"><use href=\"#i-bars\"><\u002Fuse><\u002Fsvg>Espacio &amp; radios<\u002Fa>\n\n    <div class=\"sb-section\">Iconografía<\u002Fdiv>\n    <a class=\"sb-link\" href=\"#icon-system\"><svg class=\"fpi\"><use href=\"#i-sigma\"><\u002Fuse><\u002Fsvg>Sistema<\u002Fa>\n    <a class=\"sb-link\" href=\"#icon-library\"><svg class=\"fpi\"><use href=\"#i-source\"><\u002Fuse><\u002Fsvg>Librería<\u002Fa>\n    <a class=\"sb-link\" href=\"#icon-construction\"><svg class=\"fpi\"><use href=\"#i-target\"><\u002Fuse><\u002Fsvg>Construcción<\u002Fa>\n\n    <div class=\"sb-section\">Componentes<\u002Fdiv>\n    <a class=\"sb-link\" href=\"#kpis\"><svg class=\"fpi\"><use href=\"#i-trend-up\"><\u002Fuse><\u002Fsvg>KPIs<\u002Fa>\n    <a class=\"sb-link\" href=\"#status\"><svg class=\"fpi\"><use href=\"#i-pulse\"><\u002Fuse><\u002Fsvg>Status &amp; badges<\u002Fa>\n    <a class=\"sb-link\" href=\"#tablas\"><svg class=\"fpi\"><use href=\"#i-report\"><\u002Fuse><\u002Fsvg>Tablas<\u002Fa>\n    <a class=\"sb-link\" href=\"#charts\"><svg class=\"fpi\"><use href=\"#i-bars\"><\u002Fuse><\u002Fsvg>Charts<\u002Fa>\n    <a class=\"sb-link\" href=\"#sentimiento\"><svg class=\"fpi\"><use href=\"#i-sentiment\"><\u002Fuse><\u002Fsvg>Sentimiento<\u002Fa>\n    <a class=\"sb-link\" href=\"#botones\"><svg class=\"fpi\"><use href=\"#i-arrow-right\"><\u002Fuse><\u002Fsvg>Botones<\u002Fa>\n\n    <div class=\"sb-section\">Aplicación<\u002Fdiv>\n    <a class=\"sb-link\" href=\"#patron\"><svg class=\"fpi\"><use href=\"#i-eye\"><\u002Fuse><\u002Fsvg>Patrón en uso<\u002Fa>\n\n    <div class=\"sb-foot\">\n      <span>v0.1 · 2026<\u002Fspan>\n      <span class=\"ver\">FNM-POL<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ============================================================\n       CONTENT\n       ============================================================ -->\n  <main class=\"content\">\n\n    <!-- Topbar -->\n    <div class=\"topbar\">\n      <div class=\"crumbs\">\n        <span>Finem<\u002Fspan>\n        <span class=\"sep\">/<\u002Fspan>\n        <span>Politics<\u002Fspan>\n        <span class=\"sep\">/<\u002Fspan>\n        <span class=\"here\">Sistema visual<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <div class=\"search\">\n          <svg><use href=\"#i-search\"><\u002Fuse><\u002Fsvg>\n          Buscar token, componente…\n          <span class=\"kbd\">⌘K<\u002Fspan>\n        <\u002Fdiv>\n        <button class=\"btn ghost\"><svg><use href=\"#i-download\"><\u002Fuse><\u002Fsvg>Exportar<\u002Fbutton>\n        <button class=\"btn primary\"><svg><use href=\"#i-share\"><\u002Fuse><\u002Fsvg>Compartir<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"doc\">\n\n      <!-- ============================================================\n           HERO\n           ============================================================ -->\n      <section id=\"intro\">\n        <div class=\"doc-eyebrow\">\n          <span class=\"dot\"><\u002Fspan>\n          Sistema visual · v0.1\n        <\u002Fdiv>\n        <h1 class=\"doc-h1\">\n          Finem Politics. Inteligencia política con la precisión de un terminal.\n        <\u002Fh1>\n        <p class=\"doc-lede\">\n          Politics extiende el sistema Finem con una capa de datos densa: un verde de señal, una iconografía geométrica propia y patrones de superficie pensados para reportes de escucha social, monitoreo electoral e inteligencia narrativa. Densidad sin ruido. Estructura sin fricción.\n        <\u002Fp>\n\n        <div class=\"doc-meta\">\n          <div><strong>Hereda de<\u002Fstrong> · Finem master (dark, Circular Std, signature easing)<\u002Fdiv>\n          <div><strong>Modos<\u002Fstrong> · Dark (default) · Print<\u002Fdiv>\n          <div><strong>Acento<\u002Fstrong> · Signal Green <span class=\"code\">oklch(72% 0.16 162)<\u002Fspan><\u002Fdiv>\n          <div><strong>Iconos<\u002Fstrong> · 60+ glyphs · grid 16 · stroke 1.5<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ============================================================\n           PRINCIPIOS\n           ============================================================ -->\n      <section id=\"principios\" class=\"sec\">\n        <div class=\"sec-head\">\n          <h2>01 · Principios <a class=\"anchor\" href=\"#principios\">#<\u002Fa><\u002Fh2>\n          <span class=\"num\">5 reglas<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"sec-intro\">\n          Politics no es una skin. Es una postura. Cada decisión visual se mide contra estas cinco reglas. Si una pantalla las cumple, está dentro del sistema.\n        <\u002Fp>\n\n        <div class=\"grid cols-2\">\n          <div class=\"card card-pad\">\n            <div class=\"caption-row\">\n              <span class=\"badge green\"><span class=\"dot live\" style=\"width:6px;height:6px;\"><\u002Fspan>P-01<\u002Fspan>\n              <span>Densidad legible<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"sub\" style=\"margin-top:14px;\">Más datos, menos ruido<\u002Fh3>\n            <p style=\"font-size:13.5px; color:var(--pol-fg-3); line-height:1.6; margin:0;\">\n              Mostrar lo que el analista necesita en una sola pantalla. Filas de 32px, gutters de 24px, números tabulares. La línea es un hairline a 5–8% de blanco; jamás un divisor pesado.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card card-pad\">\n            <div class=\"caption-row\">\n              <span class=\"badge green\">P-02<\u002Fspan>\n              <span>Color es información<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"sub\" style=\"margin-top:14px;\">Verde, ámbar, rojo. Y nada más.<\u002Fh3>\n            <p style=\"font-size:13.5px; color:var(--pol-fg-3); line-height:1.6; margin:0;\">\n              El verde de señal es el único acento decorativo. Estados <span class=\"code\">live<\u002Fspan>, <span class=\"code\">warn<\u002Fspan>, <span class=\"code\">danger<\u002Fspan> son códigos. Los colores de partido sólo aparecen cuando el contenido habla del partido.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card card-pad\">\n            <div class=\"caption-row\">\n              <span class=\"badge green\">P-03<\u002Fspan>\n              <span>Tipografía como UI<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"sub\" style=\"margin-top:14px;\">Circular para humanos, mono para datos<\u002Fh3>\n            <p style=\"font-size:13.5px; color:var(--pol-fg-3); line-height:1.6; margin:0;\">\n              Circular Std en encabezados y prosa. JetBrains Mono en cualquier número, ID, token, timestamp, código corto. Esa separación es lo que da el look terminal-grade.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card card-pad\">\n            <div class=\"caption-row\">\n              <span class=\"badge green\">P-04<\u002Fspan>\n              <span>Movimiento ínfimo<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"sub\" style=\"margin-top:14px;\">Casi imperceptible<\u002Fh3>\n            <p style=\"font-size:13.5px; color:var(--pol-fg-3); line-height:1.6; margin:0;\">\n              Pulses de status, fade de hover (140ms), nada más. Sin bouncing, sin elásticos, sin parallax. Politics no es marketing — es operación.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card card-pad\" style=\"grid-column: span 2;\">\n            <div class=\"caption-row\">\n              <span class=\"badge green\">P-05<\u002Fspan>\n              <span>Imprimible por default<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"sub\" style=\"margin-top:14px;\">Si no exporta a PDF, no existe<\u002Fh3>\n            <p style=\"font-size:13.5px; color:var(--pol-fg-3); line-height:1.6; margin:0; max-width:680px;\">\n              Cada componente debe sobrevivir a la impresión: tipografía contrastada, sin glassmorphism crítico, charts que se entienden en blanco y negro. La interfaz vive en la web, pero el reporte vive en la imprenta del cliente.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ============================================================\n           BRAND / LOGO\n           ============================================================ -->\n      <section id=\"brand\" class=\"sec\">\n        <div class=\"sec-head\">\n          <h2>02 · Marca <a class=\"anchor\" href=\"#brand\">#<\u002Fa><\u002Fh2>\n          <span class=\"num\">finem-politics.svg<\u002Fspan>\n        <\u002Fdiv>\n\n        <p class=\"sec-intro\">\n          Logotipo dedicado de la línea Politics — geometría heredada de Finem master, con el bloque <em>Politics<\u002Fem> tipografiado en bajas. Se usa siempre con la mancha en blanco sobre fondo oscuro, o ink-on-white para superficies claras.\n        <\u002Fp>\n\n        <div class=\"grid cols-2\">\n          <div class=\"card\" style=\"display:grid; place-items:center; padding:48px; min-height:200px;\">\n            <img src=\"9644b99c-1aaf-47e1-808a-06f61304f8b8\" alt=\"Finem Politics\" style=\"width:60%; max-width:360px; filter: invert(1) brightness(1.2);\">\n          <\u002Fdiv>\n          <div class=\"card\" style=\"display:grid; place-items:center; padding:48px; background: #f5f6f8; min-height:200px;\">\n            <img src=\"9644b99c-1aaf-47e1-808a-06f61304f8b8\" alt=\"Finem Politics\" style=\"width:60%; max-width:360px;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"grid cols-3\" style=\"margin-top:24px;\">\n          <div class=\"card card-pad\">\n            <h3 class=\"sub\" style=\"margin-top:0;\">Mínimo<\u002Fh3>\n            <p style=\"font-size:12.5px; color:var(--pol-fg-3); line-height:1.55; margin:0;\">\n              Nunca menor a 96px de ancho en pantalla. En print, 24mm.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card card-pad\">\n            <h3 class=\"sub\" style=\"margin-top:0;\">Espacio libre<\u002Fh3>\n            <p style=\"font-size:12.5px; color:var(--pol-fg-3); line-height:1.55; margin:0;\">\n              Igual a la altura de la <em>F<\u002Fem> en los cuatro lados. Sin excepciones.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"card card-pad\">\n            <h3 class=\"sub\" style=\"margin-top:0;\">No<\u002Fh3>\n            <p style=\"font-size:12.5px; color:var(--pol-fg-3); line-height:1.55; margin:0;\">\n              No deformar, no sombrear, no aplicar sobre fotografía sin caja sólida.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ============================================================\n           COLOR\n           ============================================================ -->\n      <section id=\"color\" class=\"sec\">\n        <div class=\"sec-head\">\n          <h2>03 · Color <a class=\"anchor\" href=\"#color\">#<\u002Fa><\u002Fh2>\n          <span class=\"num\">28 tokens<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"sec-intro\">\n          La paleta es deliberadamente reducida. Seis grises de superficie, cinco grises de texto, una rampa verde signal y cinco colores de estado. Los partidos viven en una capa aparte (§04) y nunca se mezclan con la UI base.\n        <\u002Fp>\n\n        <h3 class=\"sub\">Superficies — fondos &amp; bordes<\u002Fh3>\n        <div class=\"grid cols-6\">\n          <div class=\"swatch\"><div class=\"swatch-fill\" style=\"background:#05070d;\"><\u002Fdiv><div class=\"swatch-meta\"><div class=\"name\">bg-0<\u002Fdiv><div class=\"v\">#05070d<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"swatch\"><div class=\"swatch-fill\" style=\"background:#0a0d14;\"><\u002Fdiv><div class=\"swatch-meta\"><div class=\"name\">bg-1<\u002Fdiv><div class=\"v\">#0a0d14<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"swatch\"><div class=\"swatch-fill\" style=\"background:#0e1219;\"><\u002Fdiv><div class=\"swatch-meta\"><div class=\"name\">bg-2<\u002Fdiv><div class=\"v\">#0e1219<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"swatch\"><div class=\"swatch-fill\" style=\"background:#131822;\"><\u002Fdiv><div class=\"swatch-meta\"><div class=\"name\">bg-3<\u002Fdiv><div class=\"v\">#131822<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"swatch\"><div class=\"swatch-fill\" style=\"background:#04060b;\"><\u002Fdiv><div class=\"swatch-meta\"><div class=\"name\">inset<\u002Fdiv><div class=\"v\">#04060b<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"swatch\"><div class=\"swatch-fill\" style=\"background:#1a1f2b; border-bottom: 1px solid rgba(255,255,255,0.18)\"><\u002Fdiv><div class=\"swatch-meta\"><div class=\"name\">line-4<\u002Fdiv><div class=\"v\">rgba(/.18)<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 class=\"sub\">Texto — rampa de contraste<\u002Fh3>\n        <div class=\"card\" style=\"padding:18px 22px;\">\n          <div style=\"display:grid; grid-template-columns: 56px 1fr 80px; row-gap:10px; column-gap:18px; align-items:center; font-size:13.5px;\">\n            <div style=\"font-family:var(--pol-mono); font-size:11px; color:var(--pol-fg-4);\">fg-0<\u002Fdiv>\n            <div style=\"color: var(--pol-fg-0);\">Lorem ipsum dolor — máximo contraste, sólo display y números clave<\u002Fdiv>\n            <div style=\"font-family:var(--pol-mono); font-size:11px; color:var(--pol-fg-4); text-align:right;\">#ffffff<\u002Fdiv>\n\n            <div style=\"font-family:var(--pol-mono); font-size:11px; color:var(--pol-fg-4);\">fg-1<\u002Fdiv>\n            <div style=\"color: var(--pol-fg-1);\">Lorem ipsum dolor — body strong, encabezados de tabla<\u002Fdiv>\n            <div style=\"font-family:var(--pol-mono); font-size:11px; color:var(--pol-fg-4); text-align:right;\">/.92<\u002Fdiv>\n\n            <div style=\"font-family:var(--pol-mono); font-size:11px; color:var(--pol-fg-4);\">fg-2<\u002Fdiv>\n            <div style=\"color: var(--pol-fg-2);\">Lorem ipsum dolor — texto de párrafo, celdas<\u002Fdiv>\n            <div style=\"font-family:var(--pol-mono); font-size:11px; color:var(--pol-fg-4); text-align:right;\">/.78<\u002Fdiv>\n\n            <div style=\"font-family:var(--pol-mono); font-size:11px; color:var(--pol-fg-4);\">fg-3<\u002Fdiv>\n            <div style=\"color: var(--pol-fg-3);\">Lorem ipsum dolor — secundario, descripciones<\u002Fdiv>\n            <div style=\"font-family:var(--pol-m ; color:var(--pol-fg-4);\">FNM-POL-2026-W17<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ============================================================\n           ESPACIO &amp; RADIOS\n           ============================================================ -->\n      <section id=\"espacio\" class=\"sec\">\n        <div class=\"sec-head\">\n          <h2>06 · Espacio &amp; radios <a class=\"anchor\" href=\"#espacio\">#<\u002Fa><\u002Fh2>\n          <span class=\"num\">scale 4<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"sec-intro\">\n          Escala basada en 4. Politics tiene radios <em>más cerrados<\u002Fem> que el master Finem (4–16px) — la pill de 9999px se reserva para badges, dots y CTAs ocasionales. Las cajas grandes son rectángulos.\n        <\u002Fp>\n\n        <div class=\"grid cols-2\">\n          <div class=\"card card-pad\">\n            <h3 class=\"sub\" style=\"margin-top:0;\">Spacing scale<\u002Fh3>\n            <div style=\"display:flex; flex-direction:column; gap:8px;\">\n              <div style=\"display:flex; align-items:center; gap:14px;\"><div style=\"background:var(--pol-green); height:8px; width:4px; border-radius:2px;\"><\u002Fdiv><span class=\"code\">4<\u002Fspan><span style=\"color:var(--pol-fg-4); font-size:12px;\">unit / hairline gap<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\"><div style=\"background:var(--pol-green); height:8px; width:8px; border-radius:2px;\"><\u002Fdiv><span class=\"code\">8<\u002Fspan><span style=\"color:var(--pol-fg-4); font-size:12px;\">tight (chips, table cells)<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\"><div style=\"background:var(--pol-green); height:8px; width:12px; border-radius:2px;\"><\u002Fdiv><span class=\"code\">12<\u002Fspan><span style=\"color:var(--pol-fg-4); font-size:12px;\">comfortable<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\"><div style=\"background:var(--pol-green); height:8px; width:16px; border-radius:2px;\"><\u002Fdiv><span class=\"code\">16<\u002Fspan><span style=\"color:var(--pol-fg-4); font-size:12px;\">component padding<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\"><div style=\"background:var(--pol-green); height:8px; width:24px; border-radius:2px;\"><\u002Fdiv><span class=\"code\">24<\u002Fspan><span style=\"color:var(--pol-fg-4); font-size:12px;\">card / section gutter<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\"><div style=\"background:var(--pol-green); height:8px; width:32px; border-radius:2px;\"><\u002Fdiv><span class=\"code\">32<\u002Fspan><span style=\"color:var(--pol-fg-4); font-size:12px;\">section padding<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\"><div style=\"background:var(--pol-green); height:8px; width:48px; border-radius:2px;\"><\u002Fdiv><span class=\"code\">48<\u002Fspan><span style=\"color:var(--pol-fg-4); font-size:12px;\">section break<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\"><div style=\"background:var(--pol-green); height:8px; width:80px; border-radius:2px;\"><\u002Fdiv><span class=\"code\">80<\u002Fspan><span style=\"color:var(--pol-fg-4); font-size:12px;\">page rhythm<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"card card-pad\">\n            <h3 class=\"sub\" style=\"margin-top:0;\">Radii<\u002Fh3>\n            <div style=\"display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;\">\n              <div style=\"text-align:center;\"><div style=\"height:64px; border:1px solid var(--pol-line-3); background:var(--pol-bg-2); border-radius:4px;\"><\u002Fdiv><div class=\"code\" style=\"margin-top:8px; display:inline-block;\">r-1 · 4<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:center;\"><div style=\"height:64px; border:1px solid var(--pol-line-3); background:var(--pol-bg-2); border-radius:6px;\"><\u002Fdiv><div class=\"code\" style=\"margin-top:8px; display:inline-block;\">r-2 · 6<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:center;\"><div style=\"height:64px; border:1px solid var(--pol-line-3); background:var(--pol-bg-2); border-radius:8px;\"><\u002Fdiv><div class=\"code\" style=\"margin-top:8px; display:inline-block;\">r-3 · 8<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:center;\"><div style=\"height:64px; border:1px solid var(--pol-line-3); background:var(--pol-bg-2); border-radius:12px;\"><\u002Fdiv><div class=\"code\" style=\"margin-top:8px; display:inline-block;\">r-4 · 12<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:center;\"><div style=\"height:64px; border:1px solid var(--pol-line-3); background:var(--pol-bg-2); border-radius:16px;\"><\u002Fdiv><div class=\"code\" style=\"margin-top:8px; display:inline-block;\">r-5 · 16<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:center; grid-column: span 3;\"><div style=\"height:32px; border:1px solid var(--pol-line-3); background:var(--pol-bg-2); border-radius:9999px;\"><\u002Fdiv><div class=\"code\" style=\"margin-top:8px; display:inline-block;\">r-pill · 9999 · sólo dots, badges, CTA secundario<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ============================================================\n           ICONOGRAFÍA — sistema\n           ============================================================ -->\n      <section id=\"icon-system\" class=\"sec\">\n        <div class=\"sec-head\">\n          <h2>07 · Iconografía — sistema <a class=\"anchor\" href=\"#icon-system\">#<\u002Fa><\u002Fh2>\n          <span class=\"num\">grid 16 · stroke 1.5<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"sec-intro\">\n          Politics estrena su propia iconografía — heredera de la filosofía Linear/Vercel pero hecha en casa, con vocabulario del dominio (sentimiento, narrativa, actor, partido, mapa). Una sola familia. Una sola regla. Cero emoji.\n        <\u002Fp>\n\n        <div class=\"grid cols-2\">\n          <div class=\"card card-pad\">\n            <h3 class=\"sub\" style=\"margin-top:0;\">Reglas<\u002Fh3>\n            <ul style=\"font-size:13px; color:var(--pol-fg-2); line-height:1.85; padding-left:18px; margin:0;\">\n              <li>Grilla base de <strong>16 × 16<\u002Fstrong>. Variantes 12, 20, 24, 28.<\u002Fli>\n              <li><strong>Stroke 1.5<\u002Fstrong> uniforme. Las variantes a 12px suben a 1.7 para conservar peso.<\u002Fli>\n              <li><strong>Sin relleno.<\u002Fstrong> El único uso de fill es para puntos (dots) interiores.<\u002Fli>\n              <li><strong>Cap y join: round.<\u002Fstrong> Nunca squared.<\u002Fli>\n              <li>Glyphs construidos con líneas rectas + arcos circulares — sin curvas Bézier libres.<\u002Fli>\n              <li>Usar <span class=\"code\">currentColor<\u002Fspan>: el icono hereda el color del texto que lo acompaña.<\u002Fli>\n              <li>Padding de <strong>1 unidad<\u002Fstrong> hacia el borde de la cell (zona de seguridad).<\u002Fli>\n              <li>Acción/utility en <code>fg-1<\u002Fcode>; status en su color; navegación inactiva en <code>fg-3<\u002Fcode>.<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n\n          <div class=\"card card-pad\" style=\"display:grid; grid-template-columns: 1fr auto; gap:24px; align-items:center;\">\n            <div>\n              <h3 class=\"sub\" style=\"margin-top:0;\">Tamaños<\u002Fh3>\n              <div style=\"display:flex; gap:24px; align-items:flex-end; margin-top:18px;\">\n                <div style=\"text-align:center;\"><svg class=\"fpi fpi-12\"><use href=\"#i-pulse\"><\u002Fuse><\u002Fsvg><div class=\"code\" style=\"display:block; margin-top:8px;\">12<\u002Fdiv><div style=\"font-size:10px; color:var(--pol-fg-4);\">tabla<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;\"><svg class=\"fpi\"><use href=\"#i-pulse\"><\u002Fuse><\u002Fsvg><div class=\"code\" style=\"display:block; margin-top:8px;\">16<\u002Fdiv><div style=\"font-size:10px; color:var(--pol-fg-4);\">UI base<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;\"><svg class=\"fpi fpi-20\"><use href=\"#i-pulse\"><\u002Fuse><\u002Fsvg><div class=\"code\" style=\"display:block; margin-top:8px;\">20<\u002Fdiv><div style=\"font-size:10px; color:var(--pol-fg-4);\">listas<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;\"><svg class=\"fpi fpi-24\"><use href=\"#i-pulse\"><\u002Fuse><\u002Fsvg><div class=\"code\" style=\"display:block; margin-top:8px;\">24<\u002Fdiv><div style=\"font-size:10px; color:var(--pol-fg-4);\">cards<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;\"><svg class=\"fpi fpi-28\"><use href=\"#i-pulse\"><\u002Fuse><\u002Fsvg><div class=\"code\" style=\"display:block; margin-top:8px;\">28<\u002Fdiv><div style=\"font-size:10px; color:var(--pol-fg-4);\">hero<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 class=\"sub\" id=\"icon-construction\">Construcción<\u002Fh3>\n        <div class=\"grid cols-2\" style=\"align-items:center;\">\n          <div class=\"card\" style=\"padding:32px; display:grid; place-items:center; background: var(--pol-bg-inset);\">\n            <div class=\"icon-construction\">\n              <svg><use href=\"#i-target\"><\u002Fuse><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <p style=\"font-size:14px; color:var(--pol-fg-2); line-height:1.7;\">\n              Cada glyph se dibuja en una grilla de <strong>16 × 16<\u002Fstrong>. La <span class=\"code\">live area<\u002Fspan> (área verde punteada) es <strong>14 × 14<\u002Fstrong> — un padding de una unidad a cada lado garantiza alineación visual cuando el icono se compone con texto y otros iconos en línea.\n            <\u002Fp>\n            <p style=\"font-size:14px; color:var(--pol-fg-3); line-height:1.7; margin-top:10px;\">\n              Los trazos caen en pixel snap: las líneas verticales y horizontales se centran sobre coordenadas <code>x.5<\u002Fcode>; los arcos arrancan y terminan en intersecciones de la grilla. Esto evita el blur y mantiene el icono nítido a cualquier tamaño.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ============================================================\n           ICONOGRAFÍA — librería completa\n           ============================================================ -->\n      <section id=\"icon-library\" class=\"sec\">\n        <div class=\"sec-head\">\n          <h2>08 · Librería de iconos <a class=\"anchor\" href=\"#icon-library\">#<\u002Fa><\u002Fh2>\n          <span class=\"num\">60+ glyphs<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"sec-intro\">\n          Cinco categorías cubren el módulo de escucha social y dejan terreno para crecer. Cada nuevo módulo (operativo, encuestas, oposición) extenderá esta misma librería con glyphs que respetan las reglas de §07.\n        <\u002Fp>\n\n        <h3 class=\"sub\">Navegación &amp; utilidad<\u002Fh3>\n        <div class=\"icon-grid\">\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-home\"><\u002Fuse><\u002Fsvg><div class=\"name\">home<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-search\"><\u002Fuse><\u002Fsvg><div class=\"name\">search<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-filter\"><\u002Fuse><\u002Fsvg><div class=\"name\">filter<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-settings\"><\u002Fuse><\u002Fsvg><div class=\"name\">settings<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-download\"><\u002Fuse><\u002Fsvg><div class=\"name\">download<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-share\"><\u002Fuse><\u002Fsvg><div class=\"name\">share<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-link\"><\u002Fuse><\u002Fsvg><div class=\"name\">link<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-close\"><\u002Fuse><\u002Fsvg><div class=\"name\">close<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg><div class=\"name\">check<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-plus\"><\u002Fuse><\u002Fsvg><div class=\"name\">plus<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-arrow-right\"><\u002Fuse><\u002Fsvg><div class=\"name\">arrow-right<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-arrow-up\"><\u002Fuse><\u002Fsvg><div class=\"name\">arrow-up<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-arrow-down\"><\u002Fuse><\u002Fsvg><div class=\"name\">arrow-down<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-chevron\"><\u002Fuse><\u002Fsvg><div class=\"name\">chevron<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-more\"><\u002Fuse><\u002Fsvg><div class=\"name\">more<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-doc\"><\u002Fuse><\u002Fsvg><div class=\"name\">doc<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-report\"><\u002Fuse><\u002Fsvg><div class=\"name\">report<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-source\"><\u002Fuse><\u002Fsvg><div class=\"name\">source<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 class=\"sub\">Escucha social — sentimiento, narrativa, actores<\u002Fh3>\n        <div class=\"icon-grid\">\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\" style=\"color:var(--pol-green-strong);\"><use href=\"#i-pulse\"><\u002Fuse><\u002Fsvg><div class=\"name\">pulse<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-sentiment\"><\u002Fuse><\u002Fsvg><div class=\"name\">sentiment<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-narrative\"><\u002Fuse><\u002Fsvg><div class=\"name\">narrative<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-actor\"><\u002Fuse><\u002Fsvg><div class=\"name\">actor<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-actor-key\"><\u002Fuse><\u002Fsvg><div class=\"name\">actor-key<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-bot\"><\u002Fuse><\u002Fsvg><div class=\"name\">bot<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-megaphone\"><\u002Fuse><\u002Fsvg><div class=\"name\">megaphone<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-hashtag\"><\u002Fuse><\u002Fsvg><div class=\"name\">hashtag<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-mention\"><\u002Fuse><\u002Fsvg><div class=\"name\">mention<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-quote\"><\u002Fuse><\u002Fsvg><div class=\"name\">quote<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-thread\"><\u002Fuse><\u002Fsvg><div class=\"name\">thread<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-tv\"><\u002Fuse><\u002Fsvg><div class=\"name\">tv<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-radio\"><\u002Fuse><\u002Fsvg><div class=\"name\">radio<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-eye\"><\u002Fuse><\u002Fsvg><div class=\"name\">eye<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-flag\"><\u002Fuse><\u002Fsvg><div class=\"name\">flag<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 class=\"sub\">Geografía &amp; territorio<\u002Fh3>\n        <div class=\"icon-grid\">\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-map\"><\u002Fuse><\u002Fsvg><div class=\"name\">map<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-pin\"><\u002Fuse><\u002Fsvg><div class=\"name\">pin<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-globe\"><\u002Fuse><\u002Fsvg><div class=\"name\">globe<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-district\"><\u002Fuse><\u002Fsvg><div class=\"name\">district<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-clock\"><\u002Fuse><\u002Fsvg><div class=\"name\">clock<\u002Fdiv><\u002Fdiv>\n          <div class=\"icon-cell\"><svg class=\"fpi fpi-20\"><use href=\"#i-calendar\"><\u002Fuse><\u002Fsvg><div class=\"name\">calendar<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 class=\"sub\">Datos, métricas &amp; alertas<\u002Fh3>\n        <div class=\"icon-grid\">\n          <div class=\"icon-cell  const peakHours = [8,9,10,11,12,13,18,19,20,21]; // workday + evening peak\n    days.forEach((id, dIdx) => {\n      const root = document.getElementById(id);\n      if (!root) return;\n      for (let h = 0; h < 24; h++) {\n        const cell = document.createElement('div');\n        // base intensity by hour\n        let v = peakHours.includes(h) ? 0.55 : 0.15;\n        // weekend dip\n        if (dIdx >= 5) v *= 0.55;\n        // pseudo-random variation (deterministic by d*h)\n        const seed = ((dIdx * 31 + h * 7) % 17) / 17;\n        v = Math.min(1, v + seed * 0.45);\n        // bucket\n        const buckets = [0.06, 0.20, 0.40, 0.65, 0.92];\n        const bucket = v < 0.20 ? 0 : v < 0.40 ? 1 : v < 0.60 ? 2 : v < 0.80 ? 3 : 4;\n        cell.style.height = '14px';\n        cell.style.borderRadius = '2px';\n        cell.style.background = `oklch(72% 0.16 162 / ${buckets[bucket]})`;\n        root.appendChild(cell);\n      }\n    });\n  })();\n\n  // ---------- Sidebar active state on scroll ----------\n  (function () {\n    const links = document.querySelectorAll('.sb-link[href^=\"#\"]');\n    const sections = [...links].map(l => document.querySelector(l.getAttribute('href'))).filter(Boolean);\n    const setActive = (id) => {\n      links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + id));\n    };\n    const io = new IntersectionObserver((entries) => {\n      const visible = entries.filter(e => e.isIntersecting).sort((a,b) => b.intersectionRatio - a.intersectionRatio);\n      if (visible[0]) setActive(visible[0].target.id);\n    }, { rootMargin: '-30% 0px -55% 0px', threshold: [0, 0.25, 0.5, 0.75] });\n    sections.forEach(s => io.observe(s));\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
